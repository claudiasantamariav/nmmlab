<script>
// ============================================================
// RK4 integrator (shared by every model)
// ============================================================
function rk4step(f, y, t, dt) {
  const k1 = f(t, y);
  const k2 = f(t+dt/2, y.map((v,i)=>v+dt/2*k1[i]));
  const k3 = f(t+dt/2, y.map((v,i)=>v+dt/2*k2[i]));
  const k4 = f(t+dt,   y.map((v,i)=>v+dt*k3[i]));
  return y.map((v,i)=>v+dt/6*(k1[i]+2*k2[i]+2*k3[i]+k4[i]));
}
// integrate for `steps` steps of size dt, returns {ts, ys}.
// `sub` runs several finer RK4 substeps per recorded point (dt/sub each) so fast
// oscillations (large omega with a coarse dt) don't pick up visible numerical drift —
// the recorded time grid is still spaced by dt, only the internal accuracy improves.
function integrate(f, y0, steps, dt, sub=1) {
  const ts=new Array(steps+1), ys=new Array(steps+1);
  let y=y0.slice(), t=0;
  ts[0]=0; ys[0]=y.slice();
  const subdt=dt/sub;
  for(let i=0;i<steps;i++){
    for(let s=0;s<sub;s++){ y=rk4step(f,y,t,subdt); t+=subdt; }
    ts[i+1]=t; ys[i+1]=y.slice();
  }
  return {ts, ys};
}
function downsample(arr, target) {
  const step=Math.max(1,Math.floor(arr.length/target));
  const out=[]; for(let i=0;i<arr.length;i+=step) out.push(arr[i]);
  return out;
}

// ── seeded PRNG (mulberry32) — deterministic, reproducible per (seed) ──
function makeRng(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ── Radix-2 FFT (recursive, simple) ──
// Iterative in-place radix-2 FFT (Cooley-Tukey with bit-reversal). In-place with no
// per-call allocation.
function fft(re, im) {
  const n=re.length;
  for(let i=1,j=0;i<n;i++){
    let bit=n>>1;
    for(;j&bit;bit>>=1) j^=bit;
    j^=bit;
    if(i<j){ let t=re[i];re[i]=re[j];re[j]=t; t=im[i];im[i]=im[j];im[j]=t; }
  }
  for(let len=2;len<=n;len<<=1){
    const ang=-2*Math.PI/len, wr0=Math.cos(ang), wi0=Math.sin(ang);
    for(let i=0;i<n;i+=len){
      let wr=1, wi=0;
      for(let k=0;k<len/2;k++){
        const ur=re[i+k], ui=im[i+k];
        const vr=re[i+k+len/2]*wr-im[i+k+len/2]*wi;
        const vi=re[i+k+len/2]*wi+im[i+k+len/2]*wr;
        re[i+k]=ur+vr; im[i+k]=ui+vi;
        re[i+k+len/2]=ur-vr; im[i+k+len/2]=ui-vi;
        const nwr=wr*wr0-wi*wi0, nwi=wr*wi0+wi*wr0;
        wr=nwr; wi=nwi;
      }
    }
  }
}
// signal: real array, dtSeconds: sample spacing in seconds. Returns {freqs, power} (positive half only)
// A Hann window is applied before the FFT: without it, the sharp edge where the real
// signal meets the zero-padding acts like a step discontinuity and "leaks" energy into
// a noisy comb of sidelobes across every bin (the "freaky", spiky-looking spectrum).
// The window tapers both ends smoothly to zero so the padding is seamless.
function powerSpectrum(signal, dtSeconds) {
  let n=1; while(n<signal.length) n<<=1;
  const mean = signal.reduce((a,b)=>a+b,0)/signal.length;
  const re=new Array(n).fill(0), im=new Array(n).fill(0);
  const L=signal.length;
  for(let i=0;i<L;i++){
    const w=0.5-0.5*Math.cos(2*Math.PI*i/(L-1));
    re[i]=(signal[i]-mean)*w;
  }
  fft(re,im);
  const half=n/2, freqs=new Array(half), power=new Array(half);
  for(let k=0;k<half;k++){ freqs[k]=k/(n*dtSeconds); power[k]=re[k]*re[k]+im[k]*im[k]; }
  return {freqs, power};
}
// Phase-portrait trace: a thin single line normally. If the trajectory has actually
// collapsed to a fixed point (near-zero extent), a lines-only trace draws nothing at
// all, so we fall back to a single visible dot instead. Markers are NOT added on top
// of a moving trajectory — with hundreds of tightly-packed points on a small loop,
// per-point markers overlap into a painted band instead of a crisp thin circle.
function ppTrace(x, y, color, extra) {
  const xr = Math.max(...x)-Math.min(...x), yr = Math.max(...y)-Math.min(...y);
  if (xr < 1e-3 && yr < 1e-3) {
    return Object.assign({x:[x[x.length-1]], y:[y[y.length-1]], mode:'markers', marker:{color, size:7}}, extra);
  }
  return Object.assign({x, y, mode:'lines', line:{color, width:1.2}}, extra);
}
function peakFreq(freqs, power, fMax) {
  let best=-1, bestP=-Infinity;
  for(let i=1;i<freqs.length;i++){
    if(fMax && freqs[i]>fMax) break;
    if(power[i]>bestP){bestP=power[i]; best=i;}
  }
  return best>=0 ? freqs[best] : 0;
}
function formatAmp(a) {
  return a < 0.01 ? 'a barely-visible ~0' : `≈ ${a.toFixed(2)}`;
}
// linear power axis, anchored at 0 (what people expect from a spectrum) and capped
// just above the peak so the dominant rhythm is clearly visible.
function powerLayout(maxP){
  return {yaxis:{range:[0, Math.max(maxP,1e-9)*1.15], gridcolor:'#e0e4ef', title:'Power'}};
}
function bandInfo(f) {
  if (f<4)  return {name:'delta band',  note:'slow-wave, deep-sleep-like activity'};
  if (f<8)  return {name:'theta band',  note:'memory / navigation rhythm'};
  if (f<13) return {name:'alpha band',  note:'relaxed wakefulness rhythm'};
  if (f<30) return {name:'beta band',   note:'active concentration rhythm'};
  return       {name:'gamma band',   note:'typical of active cortex'};
}

// ── Colours ──
const BLUE='#002878', CORAL='#FF6657';
const PALETTE=['#002878','#FF6657','#00A676','#FFC145','#7B2CBF','#0EA5B7'];
const PCFG={responsive:true,displayModeBar:false};

function lay(title, xl, yl, extra) {
  return Object.assign({
    title:{text:title,font:{size:11,color:BLUE}},
    margin:{t:32,b:36,l:46,r:10},
    paper_bgcolor:'white', plot_bgcolor:'#f8f9fc',
    font:{size:10}, showlegend:true,
    legend:{x:0.6,y:1,font:{size:9}},
    xaxis:{gridcolor:'#e0e4ef',title:xl||''},
    yaxis:{gridcolor:'#e0e4ef',title:yl||''},
  }, extra||{});
}
function layPP(title, xl, yl) {
  const L=lay(title,xl,yl);
  L.yaxis.scaleanchor='x'; L.yaxis.scaleratio=1;
  return L;
}

// N stacked small-multiple subplots sharing one x-axis — one row per node, instead of
// overlaying N wiggly lines/spectra on top of each other (which is very hard to read
// once they cross). Matches the reference notebook's own per-node stacked layout.
// traceSets: array (one per row) of Plotly trace arrays.
function stackedTraces(traceSets, colors, rowLabels, xlabel){
  const n=traceSets.length, gap=0.05;
  const rowH=(1-gap*(n-1))/n;
  const layout={
    margin:{t:32,b:36,l:56,r:10},
    paper_bgcolor:'white', plot_bgcolor:'#f8f9fc',
    font:{size:10}, showlegend:false,
  };
  const data=[];
  for(let i=0;i<n;i++){
    const top=1-i*(rowH+gap), bottom=top-rowH;
    const xKey=i===0?'xaxis':`xaxis${i+1}`, yKey=i===0?'yaxis':`yaxis${i+1}`;
    const xName=i===0?'x':`x${i+1}`, yName=i===0?'y':`y${i+1}`;
    layout[xKey]={domain:[0,1], anchor:yName, gridcolor:'#e0e4ef',
      matches: i===0?undefined:'x', showticklabels: i===n-1, title: i===n-1?{text:xlabel,font:{size:10}}:''};
    layout[yKey]={domain:[bottom,top], anchor:xName, gridcolor:'#e0e4ef', title:{text:rowLabels[i],font:{size:9,color:colors[i]}}};
    traceSets[i].forEach(tr=>data.push(Object.assign({xaxis:xName,yaxis:yName},tr)));
  }
  return {data, layout};
}

const TWO_PI = 2*Math.PI;

// ============================================================
// KURAMOTO PHASE OSCILLATORS
// state = [θ_1, ..., θ_N] — phase only, no amplitude
// dt = 0.01 s throughout, per spec
// ============================================================
const KURAMOTO = {
  variants:['Network'],
  cfg:{
    Network:{
      eqHtml:`<div class="eq-main">dθ<sub>i</sub>/dt = ω<sub>i</sub> + (G/N) Σ<sub>j</sub> sin(θ<sub>j</sub> − θ<sub>i</sub>)</div>
        <hr class="eq-hr">
        <div class="eq-sub">r = |1/N · Σ e<sup>iθ</sup>|   (order parameter)</div>`,
      explain:'Each oscillator has only a phase θ, no amplitude at all. The coupling nudges every oscillator toward the average phase of the group; above a critical G, they snap into synchrony. A lone phase-only oscillator is trivial — θ̇ = ω, just constant rotation — so unlike every other model here there\'s no separate "single node" variant: coupling isn\'t optional, it\'s the entire model.',
      params:[
        {id:'N',      label:'N  (oscillators)',     min:2, max:20, step:1, def:10},
        {id:'G',      label:'G  (coupling strength)',min:0, max:5, step:0.1, def:2.0},
        {id:'spread', label:'frequency spread',     min:0, max:2, step:0.05, def:0.5},
      ]
    },
  },

  simulate(variant, p){
    const {N,G,spread}=p;
    const rng=makeRng(42);
    const theta0=Array.from({length:N},()=>rng()*TWO_PI);
    const omegas=Array.from({length:N},()=>TWO_PI*(1+spread*(2*rng()-1)));
    const f=(t,theta)=>theta.map((th_i,i)=>{
      let s=0; for(let j=0;j<N;j++) s+=Math.sin(theta[j]-th_i);
      return omegas[i]+(G/N)*s;
    });
    const sim=integrate(f,theta0,1000,0.01,4);
    sim.N=N; sim.omegas=omegas; sim.theta0=theta0;
    return sim;
  },

  plots(variant, p, sim){
    const {ts,ys}=sim;
    const {N,G}=p;
    const orderR=ys.map(theta=>{
      let re=0,im=0; for(let i=0;i<N;i++){re+=Math.cos(theta[i]);im+=Math.sin(theta[i]);}
      return Math.sqrt(re*re+im*im)/N;
    });
    const finalR=orderR[orderR.length-1];
    const tD=downsample(ts,1500);
    const traceColor = G>1 ? 'rgba(255,102,87,0.25)' : 'rgba(0,40,120,0.2)';
    const cosTraces=Array.from({length:N},(_,i)=>({
      x:tD, y:downsample(ys.map(th=>Math.cos(th[i])),1500),
      mode:'lines', line:{color:traceColor,width:0.8}, showlegend:false, hoverinfo:'skip',
    }));
    cosTraces.push({x:tD, y:downsample(orderR,1500), mode:'lines', line:{color:'black',width:2.5}, name:'R(t)'});

    // Final-time phase snapshot: one dot per oscillator at θᵢ(T), plus the order
    // parameter vector R·e^{iΨ} as an arrow from the origin. Reuses the exact same
    // simulated trajectory (ys) as panel 1 above — no separate run, so this is
    // guaranteed to reflect the same R as the R(t) curve at its final instant.
    const thetaFinal=ys[ys.length-1];
    const snapX=thetaFinal.map(th=>Math.cos(th)), snapY=thetaFinal.map(th=>Math.sin(th));
    let reBar=0, imBar=0; for(let i=0;i<N;i++){ reBar+=Math.cos(thetaFinal[i]); imBar+=Math.sin(thetaFinal[i]); }
    const psi=Math.atan2(imBar/N, reBar/N);
    const circlePts=Array.from({length:101},(_,i)=>i/100*TWO_PI);
    const snapshotLayout=layPP('Phase snapshot','cos θᵢ','sin θᵢ');
    snapshotLayout.xaxis={...snapshotLayout.xaxis, range:[-1.2,1.2]};
    snapshotLayout.yaxis={...snapshotLayout.yaxis, range:[-1.2,1.2]};
    snapshotLayout.annotations=[{
      x:finalR*Math.cos(psi), y:finalR*Math.sin(psi), ax:0, ay:0,
      xref:'x', yref:'y', axref:'x', ayref:'y',
      showarrow:true, arrowhead:3, arrowsize:1.3, arrowwidth:2.5, arrowcolor:CORAL,
    }];

    // Synchronisation curve: mean R over the second half of an independent 8 s run
    // per G value (discarding the initial transient), sweeping G — reuses the SAME
    // θᵢ(0)/ωᵢ draw as the main simulation above (sim.theta0/sim.omegas) instead of
    // a fresh independent draw, so the "your G" point lines up with panels 1 and 2.
    const {theta0, omegas: omegas0}=sim;
    const Gmax=5, nG=25;
    const Gvals=[], Rmeans=[];
    for(let gi=0;gi<=nG;gi++){
      const Gv=Gmax*gi/nG;
      const fG=(t,theta)=>theta.map((th_i,i)=>{ let s=0; for(let j=0;j<N;j++) s+=Math.sin(theta[j]-th_i); return omegas0[i]+(Gv/N)*s; });
      const simG=integrate(fG, theta0, 400, 0.02, 2); // 8 s, coarser — this is a cheap sweep, not the main view
      const tail=simG.ys.slice(Math.floor(simG.ys.length*0.5)); // second half only — discards the initial transient
      const rTail=tail.map(th=>{ let re=0,im=0; for(let j=0;j<N;j++){re+=Math.cos(th[j]);im+=Math.sin(th[j]);} return Math.sqrt(re*re+im*im)/N; });
      Gvals.push(Gv); Rmeans.push(rTail.reduce((a,b)=>a+b,0)/rTail.length);
    }
    const gcIdx=Rmeans.findIndex(r=>r>0.5);
    const Gc=gcIdx>=0?Gvals[gcIdx].toFixed(2):`> ${Gmax}`;

    return [
      {data:cosTraces,
        layout:{...lay(`cos θᵢ(t) and R(t) — G = ${G.toFixed(2)}`,'t (s)','cos θᵢ  /  R(t)'), yaxis:{range:[-1.05,1.05],gridcolor:'#e0e4ef',title:'cos θᵢ  /  R(t)'}},
        capS:'Thin lines: cos(θᵢ) for each oscillator. Bold black line: order parameter R(t).',
        capD: finalR>0.9 ? 'The thin lines have locked into a single shared rhythm — fully synchronised.'
            : finalR>0.3 ? 'The thin lines are drifting into rough alignment — partial synchrony.'
            : 'The thin lines run at their own pace with no shared rhythm — incoherent.'},
      {data:[
        {x:circlePts.map(a=>Math.cos(a)),y:circlePts.map(a=>Math.sin(a)),mode:'lines',line:{color:'#cbd3e6',width:1,dash:'dot'},showlegend:false,hoverinfo:'skip'},
        {x:snapX,y:snapY,mode:'markers',marker:{color:BLUE,size:8},showlegend:false,name:'oscillators'},
      ], layout:snapshotLayout,
        capS:'Unit circle: each blue dot is one oscillator\'s phase θᵢ at the final simulated instant. Coral arrow: the order parameter vector R·e^{iΨ} — its length is R (synchrony), its direction is the mean phase Ψ.',
        capD: finalR>0.9 ? `R ≈ ${finalR.toFixed(2)} — dots clustered tightly, arrow reaching nearly to the unit circle.`
            : finalR>0.3 ? `R ≈ ${finalR.toFixed(2)} — dots partly clustered, arrow partway to the unit circle.`
            : `R ≈ ${finalR.toFixed(2)} — dots spread around the circle, arrow stays short near the origin.`},
      {data:[
        {x:Gvals,y:Rmeans,mode:'lines+markers',line:{color:BLUE,width:2},marker:{color:BLUE,size:4},showlegend:false},
        {x:[G,G],y:[0,1.05],mode:'lines',line:{color:CORAL,width:2,dash:'dash'},name:`your G = ${G.toFixed(2)}`},
      ], layout:{...lay('Synchronisation curve','Coupling G','⟨R⟩ (mean order parameter)'), yaxis:{range:[0,1.05],gridcolor:'#e0e4ef',title:'⟨R⟩'}},
        capS:'Mean order parameter (averaged over the second half of an 8 s run, after discarding the initial transient) as coupling G is swept from 0 to 5. The coral line marks your current G. With few oscillators (small N), expect a noisier, less monotonic curve — a genuine finite-size effect, not numerical error.',
        capD: `Synchrony switches on around G ≈ ${Gc}. Your G = ${G.toFixed(2)} gives ⟨R⟩ ≈ ${Rmeans[Math.min(nG,Math.round(G/Gmax*nG))]?.toFixed(2)}.`},
    ];
  }
};

// ============================================================
// HARMONIC OSCILLATORS
// state = [Re z, Im z]  (or concatenated per-oscillator for networks)
// dt = 0.01 s throughout, per spec
// ============================================================
const HO = {
  variants:['Oscillator','Network'],
  cfg:{
    Oscillator:{
      eqHtml:`<div class="eq-main">dz/dt = (α + iω) z + F₀ e<sup>iΩt</sup></div>
        <hr class="eq-hr">
        <div class="eq-sub">α = 0 → undamped &nbsp;·&nbsp; F₀ = 0 → unforced</div>`,
      explain:'ω sets the spin rate and α the growth/decay rate — set α = 0 for a lossless circle, negative to decay, positive to grow. F₀/Ω add a periodic push (set F₀ = 0 to remove it).',
      fixed:{N:1, G:0},
      params:[
        {id:'omega',       label:'ω  (rad/s)', min:1, max:100, step:0.5, def:TWO_PI*1},
        {id:'alpha',       label:'α  (growth/damping)', min:-1, max:1, step:0.01, def:-0.1, zeroLabel:'undamped'},
        {id:'F0',          label:'F₀  (drive amplitude, 0 = off)', min:0, max:2, step:0.05, def:0, zeroLabel:'unforced'},
        {id:'omega_drive', label:'Ω  (drive frequency)', min:1, max:100, step:0.5, def:TWO_PI*0.7},
        {id:'z0r',         label:'z₀ (start radius)', min:0.1, max:2, step:0.05, def:1},
      ],
    },
    Network:{
      eqHtml:`<div class="eq-main">dz<sub>i</sub>/dt = (α + iω<sub>i</sub>) z<sub>i</sub> + G(z̄ − z<sub>i</sub>) + F₀ e<sup>iΩt</sup></div>
        <hr class="eq-hr">
        <div class="eq-sub">z̄ = mean over all nodes &nbsp;·&nbsp; G = 0 or N = 1 → exactly the single oscillator</div>`,
      explain:'N copies of the oscillator above, each pulled toward the network mean z̄ by coupling G — exactly the paper\'s diffusive coupling term (Eq. 2.28), (G/N)Σⱼ Cᵢⱼ(zⱼ−zᵢ), once the connectivity Cᵢⱼ is uniform and all-to-all. Nodes get a slightly different ω so coupling has something to synchronize; the F₀/Ω drive is applied to every node. <a href="tutorial.html#coupling" target="_blank">Why this term? →</a>',
      params:[
        {id:'omega',       label:'ω  (rad/s)', min:1, max:100, step:0.5, def:TWO_PI*1},
        {id:'alpha',       label:'α  (growth/damping)', min:-1, max:1, step:0.01, def:-0.1, zeroLabel:'undamped'},
        {id:'F0',          label:'F₀  (drive amplitude, 0 = off)', min:0, max:2, step:0.05, def:0, zeroLabel:'unforced'},
        {id:'omega_drive', label:'Ω  (drive frequency)', min:1, max:100, step:0.5, def:TWO_PI*0.7},
        {id:'z0r',         label:'z₀ (start radius)', min:0.1, max:2, step:0.05, def:1},
        {id:'N', label:'N  (network size)', min:2, max:6, step:1, def:3},
        {id:'G', label:'G  (coupling strength)', min:0, max:5, step:0.05, def:1.5},
      ],
    },
  },

  simulate(variant, p){
    if(variant==='Oscillator'||variant==='Network'){
      const {omega,alpha,F0,omega_drive,z0r,N,G}=p;
      if(N<=1){
        return integrate((t,[re,im])=>[
          alpha*re-omega*im+F0*Math.cos(omega_drive*t),
          omega*re+alpha*im+F0*Math.sin(omega_drive*t),
        ], [z0r,0], 1000, 0.01, 8);
      }
      // Networked: N copies of the oscillator above, each nudged toward the
      // network mean by G(z̄−zᵢ); the same F₀/Ω drive is applied to every node.
      // A small ω spread across nodes is the only structural difference, so
      // coupling has something to visibly synchronize.
      const omegas=Array.from({length:N},(_,i)=>omega*(1+0.12*(i-(N-1)/2)));
      const rng=makeRng(42);
      const z0=[];
      for(let i=0;i<N;i++){ const ph=rng()*TWO_PI; z0.push(z0r*Math.cos(ph), z0r*Math.sin(ph)); }
      const f=(t,y)=>{
        const out=new Array(2*N);
        let sx=0, sy=0;
        for(let i=0;i<N;i++){ sx+=y[2*i]; sy+=y[2*i+1]; }
        const zxBar=sx/N, zyBar=sy/N;
        const driveRe=F0*Math.cos(omega_drive*t), driveIm=F0*Math.sin(omega_drive*t);
        for(let i=0;i<N;i++){
          const re=y[2*i], im=y[2*i+1];
          out[2*i]  = alpha*re - omegas[i]*im + G*(zxBar-re) + driveRe;
          out[2*i+1]= omegas[i]*re + alpha*im + G*(zyBar-im) + driveIm;
        }
        return out;
      };
      const sim=integrate(f,z0,1000,0.01,8);
      sim.N=N; sim.omegas=omegas;
      return sim;
    }
  },

  plots(variant, p, sim){
    const {ts,ys}=sim;

    if((variant==='Oscillator'||variant==='Network') && p.N<=1){
      const {omega,alpha,F0,omega_drive,z0r}=p;
      const isForced=F0>0.001;
      const re=ys.map(y=>y[0]), im=ys.map(y=>y[1]);
      const tD=downsample(ts,1500), reD=downsample(re,1500), imD=downsample(im,1500);
      const rate=Math.abs(alpha)>1e-9?(Math.LN2/Math.abs(alpha)).toFixed(2):null;

      // Steady-state driven amplitude (only meaningful when alpha<0; otherwise the
      // growing/neutral homogeneous part dominates and there is no true steady state).
      const gamma=alpha;
      const denomAtDrive=Math.max((omega*omega-omega_drive*omega_drive)**2+(2*gamma*omega_drive)**2, 1e-6);
      const ampAtDrive=F0/Math.sqrt(denomAtDrive);
      const nearRes=Math.abs(omega_drive-omega)<0.1*omega;

      let tsCap;
      if(!isForced){
        tsCap = alpha<0
          ? `Decaying oscillation at ω/2π = ${(omega/TWO_PI).toFixed(2)} Hz — amplitude half-life ≈ ${rate} s.`
          : alpha>0
          ? `Growing (unstable) oscillation at ω/2π = ${(omega/TWO_PI).toFixed(2)} Hz — amplitude doubles every ≈ ${rate} s.`
          : `Neutral (α = 0, undamped) — amplitude stays fixed at z₀ = ${z0r.toFixed(2)}.`;
      } else if(alpha<0){
        tsCap = nearRes
          ? `Driving near the natural frequency (Ω ≈ ω) — the response has grown to amplitude ${formatAmp(ampAtDrive)} (resonance).`
          : `Driven, off-resonance — steady-state amplitude settles to ${formatAmp(ampAtDrive)}.`;
      } else {
        tsCap = `Forced on top of a ${alpha===0?'neutral':'growing (unstable)'} oscillator — the drive doesn't stop the amplitude from ${alpha===0?'staying constant regardless':'growing without bound'}.`;
      }

      // Phase portrait uses only the first ~15 revolutions — at a fast ω over the full
      // 10 s window there can be 100+ overlapping windings only ~1% apart in radius,
      // genuinely unresolvable at any line width, not a rendering bug.
      const periodSamples=Math.max(1,Math.round((TWO_PI/omega)/0.01));
      const nShow=Math.min(re.length, 15*periodSamples+1);
      const rePP=downsample(re.slice(0,nShow),1200), imPP=downsample(im.slice(0,nShow),1200);

      let ppCap;
      if(!isForced){
        ppCap = alpha<0
          ? `Inward spiral — each revolution loses a factor e^(α·2π/ω) of its amplitude (α = ${alpha.toFixed(2)}).`
          : alpha>0
          ? `Outward spiral — each revolution gains a factor e^(α·2π/ω) in amplitude (α = ${alpha.toFixed(2)}). This is an unstable oscillator: real systems always have α ≤ 0.`
          : `Perfect circle — α = 0, no energy loss.`;
      } else if(alpha<0){
        ppCap = `Spirals inward toward a forced, off-centre steady orbit instead of the origin — forcing shifts where the oscillator settles.`;
      } else {
        ppCap = `Forcing can't tame this oscillator — with α ≥ 0 the orbit keeps drifting outward (or stays put) on top of the drive.`;
      }

      // Resonance curve — an intrinsic property of (α, ω), always shown. When F0 = 0
      // it's plotted for a unit drive to illustrate the response shape you'd get if
      // you turned forcing on.
      const F0eff=isForced?F0:1;
      const oms=[]; for(let om=1; om<=100; om+=0.5) oms.push(om);
      const amps=oms.map(Om=>{
        const rePart=omega*omega-Om*Om, imPart=2*gamma*Om;
        return F0eff/Math.sqrt(Math.max(rePart*rePart+imPart*imPart,1e-6));
      });
      const ampAtDriveShown=isForced?ampAtDrive:F0eff/Math.sqrt(denomAtDrive);

      return [
        {data:[{x:tD,y:reD,line:{color:BLUE,width:1.4},showlegend:false}],
          layout:lay('Time series','t (s)','Re(z)'),
          capS:'Real part of z(t) over time.',
          capD:tsCap},
        {data:[ppTrace(rePP,imPP,BLUE,{showlegend:false})],
          layout:layPP(isForced?'Phase portrait':'Phase portrait (first ~15 turns)','Re(z)','Im(z)'),
          capS:'Trajectory of z in the complex plane — spirals inward when damped, outward when growing.',
          capD:ppCap},
        {data:[
          {x:oms,y:amps,mode:'lines',line:{color:BLUE,width:2},name:'|H(Ω)| (analytic)'},
          {x:[omega,omega],y:[0,Math.max(...amps)*1.05],mode:'lines',line:{color:'#999',width:1.5,dash:'dash'},name:'ω (natural freq.)'},
          {x:[omega_drive],y:[ampAtDriveShown],mode:'markers',marker:{color:CORAL,size:12,line:{color:'white',width:1.5}},name:'your Ω (slider)'},
        ], layout:{...lay('Resonance curve (analytical)','Ω  (drive frequency, rad/s)',isForced?'Steady-state amplitude':'Response per unit drive'),
            annotations:[{x:omega_drive,y:ampAtDriveShown,text:'your Ω →',showarrow:false,xanchor:'right',yanchor:'bottom',font:{color:CORAL,size:10,family:'sans-serif'}}]},
          capS: isForced
            ? 'Steady-state amplitude as the driving frequency Ω is swept (computed analytically). The coral dot marks where your current Ω slider sits on this curve.'
            : 'Forcing is off (F₀ = 0), so this shows the response shape for a unit drive — turn up F₀ to actually apply it.',
          capD: isForced
            ? (nearRes
              ? `Ω = ${omega_drive.toFixed(1)} rad/s sits right on the resonance peak at ω = ${omega.toFixed(1)} rad/s.`
              : `Ω = ${omega_drive.toFixed(1)} rad/s is away from the resonance at ω = ${omega.toFixed(1)} rad/s.`)
            : `If you turned on forcing near Ω = ω = ${omega.toFixed(1)} rad/s, the response would peak here.`},
      ];
    }

    if(variant==='Oscillator'||variant==='Network'){
      const {G,alpha}=p;
      const N=sim.N, omegas=sim.omegas;
      const reAll=Array.from({length:N},(_,k)=>downsample(ys.map(y=>y[2*k]),1200));
      const imAll=Array.from({length:N},(_,k)=>downsample(ys.map(y=>y[2*k+1]),1200));
      const tD=downsample(ts,1200);
      const ampFinal=Array.from({length:N},(_,k)=>{
        const re=ys[ys.length-1][2*k], im=ys[ys.length-1][2*k+1];
        return Math.sqrt(re*re+im*im);
      });
      const spread=Math.max(...ampFinal)-Math.min(...ampFinal);
      const synced = G>1 && spread<0.2;
      const kuraNote = 'In the limit of identical amplitudes and only phase differences mattering, this network reduces to the Kuramoto model — see the Phase-only tab.';
      return [
        {data:reAll.map((r,k)=>({x:tD,y:r,name:`z${k+1} (ω=${omegas[k].toFixed(2)})`,line:{color:PALETTE[k%PALETTE.length],width:1.3}})),
          layout:lay('Time series (each oscillator)','t (s)','Re(z)'),
          capS:'Real part of each oscillator\'s trajectory.',
          capD: synced
            ? `Strong coupling (G = ${G.toFixed(2)}) — the oscillators have locked to a shared rhythm. ${kuraNote}`
            : `Weak-to-moderate coupling (G = ${G.toFixed(2)}) — each oscillator still keeps much of its own rhythm.`},
        {data:reAll.map((r,k)=>ppTrace(r,imAll[k],PALETTE[k%PALETTE.length],{name:`z${k+1}`})),
          layout:layPP('Phase portraits (overlaid)','Re(z)','Im(z)'),
          capS:'Phase portraits of all oscillators overlaid — Re(z) vs Im(z).',
          capD: synced
            ? 'Orbits overlap almost perfectly — synchronised.'
            : 'Orbits stay distinct — not yet synchronised.'},
      ];
    }
  }
};

// ============================================================
// STUART–LANDAU OSCILLATOR
// ż = (α+iω)z − (γ+iβ)|z|²z   (γ = saturation, β = shear — matches paper §3 Eq. 3.4-3.6)
// state = [x, y] per oscillator; dt = 0.01 s
// ============================================================
const SL = {
  variants:['Oscillator','Network'],
  cfg:{
    Oscillator:{
      eqHtml:`<div class="eq-main">ż = (α + iω)z − (γ + iβ)|z|²z</div>
        <hr class="eq-hr">
        <div class="eq-sub">Cartesian: ẋ = αx − ωy − γ(x²+y²)x + β(x²+y²)y &nbsp;·&nbsp; ẏ = αy + ωx − γ(x²+y²)y − β(x²+y²)x</div>
        <div class="eq-sub">α &gt; 0 → limit cycle at r* = √(α/γ) &nbsp;·&nbsp; γ &gt; 0 required</div>`,
      explain:'α is the Hopf bifurcation parameter: negative decays to rest, positive gives a self-sustained rhythm at radius r* = √(α/γ). ω sets the rotation speed and doesn\'t affect r* or the bifurcation diagram. γ (&gt;0) caps the amplitude — bigger γ means a smaller, tighter limit cycle. β doesn\'t change the amplitude either; it only shifts the instantaneous frequency as amplitude grows ("shear"). F₀/Ω add a periodic push (set F₀ = 0 to remove it).',
      fixed:{N:1, G:0},
      params:[
        {id:'alpha', label:'α  (growth/decay)', min:-2, max:2, step:0.05, def:1, zeroLabel:'undamped'},
        {id:'omega', label:'ω  (rad/s)', min:0.5, max:10, step:0.1, def:2},
        {id:'gamma', label:'γ  (saturation, &gt;0)', min:0.1, max:3, step:0.05, def:1},
        {id:'beta',  label:'β  (shear)', min:-3, max:3, step:0.05, def:1},
        {id:'F0',          label:'F₀  (drive amplitude, 0 = off)', min:0, max:2, step:0.05, def:0, zeroLabel:'unforced'},
        {id:'omega_drive', label:'Ω  (drive frequency)', min:0.5, max:10, step:0.1, def:2},
      ],
    },
    Network:{
      eqHtml:`<div class="eq-main">ż<sub>i</sub> = (α + iω<sub>i</sub>)z<sub>i</sub> − (γ + iβ)|z<sub>i</sub>|²z<sub>i</sub> + G(z̄ − z<sub>i</sub>) + F₀ e<sup>iΩt</sup></div>
        <hr class="eq-hr">
        <div class="eq-sub">z̄ = mean over all nodes &nbsp;·&nbsp; G = 0 or N = 1 → exactly the single oscillator</div>`,
      explain:'N copies of the limit-cycle oscillator above, each pulled toward the network mean z̄ by coupling G — exactly the paper\'s diffusive coupling term (Eq. 3.8), (G/N)Σⱼ Cᵢⱼ(zⱼ−zᵢ), once the connectivity Cᵢⱼ is uniform and all-to-all. Nodes get a slightly different ω so coupling has something to synchronize. <a href="tutorial.html#coupling" target="_blank">Why this term? →</a>',
      params:[
        {id:'alpha', label:'α  (growth/decay)', min:-2, max:2, step:0.05, def:1, zeroLabel:'undamped'},
        {id:'omega', label:'ω  (rad/s)', min:0.5, max:10, step:0.1, def:2},
        {id:'gamma', label:'γ  (saturation, &gt;0)', min:0.1, max:3, step:0.05, def:1},
        {id:'beta',  label:'β  (shear)', min:-3, max:3, step:0.05, def:1},
        {id:'F0',          label:'F₀  (drive amplitude, 0 = off)', min:0, max:2, step:0.05, def:0, zeroLabel:'unforced'},
        {id:'omega_drive', label:'Ω  (drive frequency)', min:0.5, max:10, step:0.1, def:2},
        {id:'N', label:'N  (network size)', min:2, max:6, step:1, def:3},
        {id:'G', label:'G  (coupling strength)', min:0, max:3, step:0.05, def:1},
      ],
    },
  },

  simulate(variant, p){
    const {alpha,omega,gamma,beta,F0,omega_drive,N,G}=p;
    if(N<=1){
      return integrate((t,[x,y])=>{
        const r2=x*x+y*y;
        return [
          alpha*x-omega*y-gamma*r2*x+beta*r2*y+F0*Math.cos(omega_drive*t),
          alpha*y+omega*x-gamma*r2*y-beta*r2*x+F0*Math.sin(omega_drive*t),
        ];
      }, [0.1,0], 3000, 0.01, 4);
    }
    // Networked: N copies of the same node above, each nudged toward the network
    // mean by G(z̄−zᵢ). A small ω spread across nodes is the only structural
    // difference — otherwise identical nodes would give G nothing to visibly do.
    // The F₀/Ω drive above is applied to every node, per the model's own §3.8-3.9
    // equations (F̂ₑ,ᵢ(t)).
    const omegas=Array.from({length:N},(_,i)=>omega*(1+0.12*(i-(N-1)/2)));
    const rng=makeRng(7);
    const z0=[];
    for(let i=0;i<N;i++){ const ph=rng()*TWO_PI; z0.push(0.3*Math.cos(ph),0.3*Math.sin(ph)); }
    const f=(t,y)=>{
      const out=new Array(2*N);
      let sx=0, sy=0;
      for(let i=0;i<N;i++){ sx+=y[2*i]; sy+=y[2*i+1]; }
      const zxBar=sx/N, zyBar=sy/N;
      const driveRe=F0*Math.cos(omega_drive*t), driveIm=F0*Math.sin(omega_drive*t);
      for(let i=0;i<N;i++){
        const x=y[2*i], yy=y[2*i+1], r2=x*x+yy*yy;
        out[2*i]  = alpha*x  - omegas[i]*yy - gamma*r2*x  + beta*r2*yy + G*(zxBar-x) + driveRe;
        out[2*i+1]= alpha*yy + omegas[i]*x  - gamma*r2*yy - beta*r2*x  + G*(zyBar-yy) + driveIm;
      }
      return out;
    };
    const sim=integrate(f,z0,3000,0.01,4);
    sim.N=N; sim.omegas=omegas;
    return sim;
  },

  plots(variant, p, sim){
    const {ts,ys}=sim;
    const {alpha,omega,gamma,beta,F0,omega_drive,N,G}=p;

    if(N<=1){
      const x=ys.map(y=>y[0]), yv=ys.map(y=>y[1]);
      const r=x.map((xi,i)=>Math.sqrt(xi*xi+yv[i]*yv[i]));
      const tD=downsample(ts,2000), xD=downsample(x,2000), yD=downsample(yv,2000), rD=downsample(r,2000);
      const hasLC=alpha>1e-9;
      const rStar=hasLC?Math.sqrt(alpha/gamma):0;
      const rFinal=r[r.length-1];
      const isForced=F0>0.001;

      let tsCap;
      if(!isForced){
        if(alpha<-1e-9) tsCap=`Decaying to rest — α = ${alpha.toFixed(2)} < 0, no sustained rhythm.`;
        else if(alpha>1e-9) tsCap=`Self-sustained limit cycle — amplitude settles at r* = √(α/γ) ≈ ${rStar.toFixed(2)}.`;
        else tsCap=`Right at the Hopf bifurcation (α = 0) — the origin is only marginally stable.`;
      } else {
        if(alpha<-1e-9) tsCap=`Forced on top of a damped oscillator (α = ${alpha.toFixed(2)} &lt; 0) — the drive keeps a rhythm going instead of letting it decay to rest.`;
        else if(alpha>1e-9) tsCap=`Forced on top of an existing limit cycle (unforced r* ≈ ${rStar.toFixed(2)}) — the drive can pull the rhythm's amplitude and phase away from that natural radius.`;
        else tsCap=`Forced right at the Hopf bifurcation (α = 0) — the drive alone is sustaining any rhythm at all.`;
      }

      let ppCap;
      if(!isForced){
        if(alpha<-1e-9) ppCap='Inward spiral to the origin — the cubic term only matters once α ≥ 0.';
        else if(alpha>1e-9) ppCap=`Spirals onto a fixed-radius limit cycle at r* ≈ ${rStar.toFixed(2)}, regardless of starting point.`;
        else ppCap='Marginal — the origin is the only fixed point, and only weakly (non-exponentially) stable.';
      } else {
        if(alpha<-1e-9) ppCap='Spirals toward a forced, off-centre steady orbit instead of collapsing to the origin — forcing shifts where the oscillator settles.';
        else if(alpha>1e-9) ppCap=`Pulled off the unforced limit cycle (dotted, r* ≈ ${rStar.toFixed(2)}) by the drive — depending on Ω vs ω this can show beating or phase-locking.`;
        else ppCap='Forcing alone sustains a driven orbit right at the marginal bifurcation point.';
      }

      // Bifurcation diagram is analytic (r* = √(α/γ)), so no simulation sweep needed —
      // cheap to redraw live on every slider move, unlike WILCO's numerically-swept one.
      const aRange=[]; for(let a=-1; a<=2.0001; a+=0.03) aRange.push(a);
      const rStable=aRange.map(a=>a<0?0:null);
      const rUnstable=aRange.map(a=>a>=0?0:null);
      const rLC=aRange.map(a=>a>0?Math.sqrt(a/gamma):null);
      const maxRLC=Math.max(0.1, ...rLC.filter(v=>v!==null));

      return [
        {data:[
          {x:tD,y:xD,name:'x(t)',line:{color:BLUE,width:1.4}},
          {x:tD,y:yD,name:'y(t)',line:{color:CORAL,width:1.4}},
          {x:tD,y:rD,name:'r(t)',line:{color:'#2E7D32',width:1.3,dash:'dash'}},
        ], layout:lay('Time series','t (s)','activity'),
          capS:'Excitatory x(t), inhibitory y(t), and amplitude r(t) = √(x²+y²).',
          capD:tsCap},
        {data: hasLC ? [
            ppTrace(downsample(x,1200),downsample(yv,1200),BLUE,{showlegend:false}),
            {x:Array.from({length:100},(_,i)=>rStar*Math.cos(i/99*TWO_PI)),
             y:Array.from({length:100},(_,i)=>rStar*Math.sin(i/99*TWO_PI)),
             mode:'lines', line:{color:'#2E7D32',width:1.5,dash:'dot'}, name:`limit cycle r*=${rStar.toFixed(2)}`},
          ] : [ppTrace(downsample(x,1200),downsample(yv,1200),BLUE,{showlegend:false})],
          layout:layPP('Phase portrait','x','y'),
          capS:'Trajectory in the (x,y) plane.',
          capD:ppCap},
        {data:[
          {x:aRange,y:rStable,mode:'lines',line:{color:'#455A64',width:2.5},name:'stable fixed point (r=0)'},
          {x:aRange,y:rUnstable,mode:'lines',line:{color:'#90A4AE',width:1.5,dash:'dash'},name:'unstable fixed point (r=0)'},
          {x:aRange,y:rLC,mode:'lines',line:{color:BLUE,width:2.5},name:'limit cycle r*=√(α/γ)'},
          {x:[0,0],y:[0,maxRLC*1.1],mode:'lines',line:{color:CORAL,width:1.2,dash:'dot'},name:'Hopf bifurcation (α=0)'},
          {x:[alpha],y:[rFinal],mode:'markers',marker:{color:'#FF6F00',size:10},name:`current α=${alpha.toFixed(2)}`},
        ], layout:lay('Bifurcation diagram','α','long-run amplitude r',{yaxis:{range:[-0.05,maxRLC*1.2],gridcolor:'#e0e4ef',title:'r'}}),
          capS:'Long-run amplitude as the bifurcation parameter α is swept (analytic curve for F₀ = 0; γ fixed at the current slider value).',
          capD: isForced
            ? `γ = ${gamma.toFixed(2)} sets the unforced branch shown here — with F₀ = ${F0.toFixed(2)} &gt; 0, your actual amplitude can sit off this curve.`
            : `γ = ${gamma.toFixed(2)} sets how sharply the limit-cycle branch rises above α = 0.`},
      ];
    }

    // Network view (N > 1)
    const N_=sim.N, omegas=sim.omegas;
    const xAll=Array.from({length:N_},(_,k)=>downsample(ys.map(y=>y[2*k]),1200));
    const yAll=Array.from({length:N_},(_,k)=>downsample(ys.map(y=>y[2*k+1]),1200));
    const tD=downsample(ts,1200);
    const rFinal=Array.from({length:N_},(_,k)=>{
      const x=ys[ys.length-1][2*k], y=ys[ys.length-1][2*k+1];
      return Math.sqrt(x*x+y*y);
    });
    const spread=Math.max(...rFinal)-Math.min(...rFinal);
    const synced=G>0.5 && spread<0.15;

    return [
      {data:xAll.map((x,k)=>({x:tD,y:x,name:`z${k+1} (ω=${omegas[k].toFixed(2)})`,line:{color:PALETTE[k%PALETTE.length],width:1.3}})),
        layout:lay('Time series (each oscillator)','t (s)','x'),
        capS:'Excitatory component of each oscillator\'s trajectory.',
        capD: synced
          ? `Strong coupling (G = ${G.toFixed(2)}) has pulled all ${N_} oscillators onto a shared rhythm despite their different ωᵢ.`
          : `Coupling G = ${G.toFixed(2)} — each oscillator still keeps much of its own frequency.`},
      {data:xAll.map((x,k)=>ppTrace(x,yAll[k],PALETTE[k%PALETTE.length],{name:`z${k+1}`})),
        layout:layPP('Phase portraits (overlaid)','x','y'),
        capS:'Phase portraits of all oscillators overlaid.',
        capD: synced
          ? 'Orbits overlap almost perfectly — synchronised via diffusive coupling.'
          : 'Orbits stay distinct — not yet synchronised.'},
    ];
  }
};

// ============================================================
// WILSON–COWAN
// time in ms, dt = 0.01 ms, T = 500 ms (per spec)
// ============================================================
function sigmoid(I, slope, I0){ return 1/(1+Math.exp(slope*(I0-I))); }
const SLOPE_X=1.3, I0_X=4.0, SLOPE_Y=2.0, I0_Y=3.7;

// Regime is classified from the ACTUAL simulated trajectory (amplitude + resting
// level), not from a fixed Px cutoff — a fixed number like "Px<0.8" doesn't track the
// real Hopf bifurcation point, which shifts with wxx/taux and isn't even at a round
// number (for the defaults it's closer to Px≈1.3, not 0.8).
function wilcoRegimeFromData(amp, meanX){
  if (amp > 0.01) return {key:'oscillating', label:'oscillating (limit cycle)'};
  return meanX > 0.5 ? {key:'saturated', label:'saturated (maximum firing)'} : {key:'silent', label:'silent (at rest)'};
}
function wilcoTimeSeriesCaptionFromData(amp, meanX){
  const r=wilcoRegimeFromData(amp, meanX).key;
  if(r==='silent') return 'System is silent — no rhythm, both populations at rest.';
  if(r==='oscillating') return 'Steady rhythm — the inhibitory population always lags the excitatory by a quarter cycle.';
  return 'Both populations saturated at maximum firing rate.';
}
// Looks up the bifurcation curve's amplitude at a given Px, to answer "would a node
// with this Px oscillate on its own, in isolation?" — used to detect nodes that are
// only oscillating because they're entrained by a coupled neighbour, not on their own.
function bifAmplitudeAt(bif, px){
  const step=bif.ps[1]-bif.ps[0];
  const idx=Math.max(0, Math.min(bif.amps.length-1, Math.round((px-bif.ps[0])/step)));
  return bif.amps[idx];
}

let _bifCache={key:null,ps:null,amps:null};
// Scalar (no per-step array allocation) RK4 for one Px point. The generic array-based
// integrate() took ~2.1s for the full 61-point sweep (a real freeze every time
// wxx/taux is dragged); this brings it down sharply by avoiding array allocation in
// the hot loop and tracking running min/max instead of storing (and re-scanning) the
// whole trajectory.
function bifurcationCell(wxx, taux, pv, steps, dt, tailStart){
  let x=0.1, y=0.05;
  let tailMax=-Infinity, tailMin=Infinity;
  for(let i=0;i<=steps;i++){
    if(i>=tailStart){ if(x>tailMax) tailMax=x; if(x<tailMin) tailMin=x; }
    const s1x=1/(1+Math.exp(SLOPE_X*(I0_X-(wxx*x-12*y+pv))));
    const s1y=1/(1+Math.exp(SLOPE_Y*(I0_Y-(15*x-3*y))));
    const k1x=(s1x-x)/taux, k1y=(s1y-y)/8;
    const x2=x+0.5*dt*k1x, y2=y+0.5*dt*k1y;
    const s2x=1/(1+Math.exp(SLOPE_X*(I0_X-(wxx*x2-12*y2+pv))));
    const s2y=1/(1+Math.exp(SLOPE_Y*(I0_Y-(15*x2-3*y2))));
    const k2x=(s2x-x2)/taux, k2y=(s2y-y2)/8;
    const x3=x+0.5*dt*k2x, y3=y+0.5*dt*k2y;
    const s3x=1/(1+Math.exp(SLOPE_X*(I0_X-(wxx*x3-12*y3+pv))));
    const s3y=1/(1+Math.exp(SLOPE_Y*(I0_Y-(15*x3-3*y3))));
    const k3x=(s3x-x3)/taux, k3y=(s3y-y3)/8;
    const x4=x+dt*k3x, y4=y+dt*k3y;
    const s4x=1/(1+Math.exp(SLOPE_X*(I0_X-(wxx*x4-12*y4+pv))));
    const s4y=1/(1+Math.exp(SLOPE_Y*(I0_Y-(15*x4-3*y4))));
    const k4x=(s4x-x4)/taux, k4y=(s4y-y4)/8;
    x=x+dt/6*(k1x+2*k2x+2*k3x+k4x);
    y=y+dt/6*(k1y+2*k2y+2*k3y+k4y);
  }
  return tailMax-tailMin;
}
function computeBifurcation(wxx, taux){
  const key=wxx.toFixed(2)+'_'+taux.toFixed(2);
  if(_bifCache.key===key) return _bifCache;
  // 600 ms settle time per Px (longer than the main 500 ms view — near a bifurcation,
  // transients decay slowly, so a short sim reads a transient, not the true attractor,
  // which is what made this curve look noisy/jagged). Only the last 20% is measured,
  // matching the reference notebook's sol[0, -len(t)//5:].
  const dt=0.05, steps=12000; // 600 ms (0.02ms/30000 steps was 400 substeps per the 8ms
  // time constant — RK4 is plenty accurate at 160 substeps, so this cuts the cost further
  // with no real accuracy loss)
  const tailStart=Math.floor(steps*0.8);
  const ps=[], amps=[];
  for(let pv=0; pv<=6.0001; pv+=0.1){
    ps.push(pv);
    amps.push(bifurcationCell(wxx, taux, pv, steps, dt, tailStart));
  }
  _bifCache={key,ps,amps};
  return _bifCache;
}


const WILCO = {
  variants:['Single Node','Network'],
  cfg:{
    'Single Node':{
      eqHtml:`<div class="eq-main">τ<sub>x</sub>ẋ + x = σ(w<sub>xx</sub>x − w<sub>xy</sub>y + P<sub>x</sub> + F<sub>e</sub>(t))</div>
        <div class="eq-main">τ<sub>y</sub>ẏ + y = σ(w<sub>yx</sub>x − w<sub>yy</sub>y)</div>
        <hr class="eq-hr">
        <div class="eq-sub">F<sub>e</sub>(t) = A · sin(2π·f·t / 1000) &nbsp;·&nbsp; A = 0 → unforced</div>
        <div class="eq-sub">σ(I) = 1 / (1 + e<sup>slope·(I0 − I)</sup>) &nbsp;·&nbsp; fixed: τ<sub>y</sub>=8, w<sub>xy</sub>=12, w<sub>yx</sub>=15, w<sub>yy</sub>=3</div>`,
      explain:'x is the excitatory firing rate and y the inhibitory firing rate. P_x is a constant background drive — turn it up and the E–I loop can start oscillating on its own (a Hopf bifurcation). A and f add a rhythmic input on top of that; set A = 0 to remove it.',
      fixed:{N:1, G:0},
      params:[
        {id:'Px',    label:'P<sub>x</sub>  (drive)', min:0, max:6, step:0.05, def:1.5},
        {id:'wxx',   label:'w<sub>xx</sub>  (E→E)',  min:0, max:20, step:0.5, def:16},
        {id:'taux',  label:'τ<sub>x</sub>  (ms)',    min:1, max:20, step:0.5, def:8},
        {id:'A',     label:'A  (forcing amplitude, 0 = off)', min:0, max:0.2, step:0.005, def:0, zeroLabel:'unforced'},
        {id:'fStim', label:'f<sub>stim</sub>  (Hz)', min:1, max:80, step:1, def:24},
      ],
    },
    Network:{
      eqHtml:`<div class="eq-main">τ<sub>x</sub>ẋ<sub>i</sub> + x<sub>i</sub> = σ(w<sub>xx</sub>x<sub>i</sub> − w<sub>xy</sub>y<sub>i</sub> + P<sub>x,i</sub> + F<sub>e,i</sub>(t) + G(x̄ − x<sub>i</sub>))</div>
        <div class="eq-main">τ<sub>y</sub>ẏ<sub>i</sub> + y<sub>i</sub> = σ(w<sub>yx</sub>x<sub>i</sub> − w<sub>yy</sub>y<sub>i</sub>)</div>
        <hr class="eq-hr">
        <div class="eq-sub">x̄ = mean over all nodes &nbsp;·&nbsp; G = 0 or N = 1 → exactly the single node</div>`,
      explain:'N copies of the node above, each pulled toward the network mean firing rate x̄ by coupling G, added inside σ — a diffusive stand-in for the paper\'s row-summed term (Eq. 5.5), G Σⱼ Cᵢⱼxⱼ, chosen so the coupling input stays bounded as N grows instead of scaling with it. Nodes get a slightly different P<sub>x</sub> so some may need coupling to oscillate at all; only node 0 feels A/f<sub>stim</sub> directly — watch it reach the others only through coupling. <a href="tutorial.html#coupling" target="_blank">Why this term? →</a>',
      params:[
        {id:'Px',    label:'P<sub>x</sub>  (drive)', min:0, max:6, step:0.05, def:1.5},
        {id:'wxx',   label:'w<sub>xx</sub>  (E→E)',  min:0, max:20, step:0.5, def:16},
        {id:'taux',  label:'τ<sub>x</sub>  (ms)',    min:1, max:20, step:0.5, def:8},
        {id:'A',     label:'A  (forcing amplitude, 0 = off)', min:0, max:0.2, step:0.005, def:0, zeroLabel:'unforced'},
        {id:'fStim', label:'f<sub>stim</sub>  (Hz)', min:1, max:80, step:1, def:24},
        {id:'N', label:'N  (network size)', min:2, max:5, step:1, def:3},
        {id:'G', label:'G  (coupling strength)', min:0, max:5, step:0.1, def:1.5},
      ],
    },
  },

  simulate(variant, p){
    const dt=0.01, steps=50000; // 0 → 500 ms
    const {Px,wxx,taux,A,fStim,N,G}=p;
    if(N<=1){
      const f=(t,[x,y])=>{
        const Fe=A*Math.sin(2*Math.PI*fStim*t/1000);
        return [
          (sigmoid(wxx*x-12*y+Px+Fe, SLOPE_X, I0_X)-x)/taux,
          (sigmoid(15*x-3*y, SLOPE_Y, I0_Y)-y)/8,
        ];
      };
      return integrate(f,[0.1,0.05],steps,dt);
    }
    // Networked: N copies of the node above, each nudged toward the network's
    // mean excitatory rate by G(x̄−xᵢ) inside its own sigmoid. Nodes get a small
    // spread in Px so some may need coupling to oscillate at all; only node 0
    // feels the A/fStim stimulus directly, to show it propagate via coupling.
    const PxVals=Array.from({length:N},(_,i)=>Px+0.5*(i-(N-1)/2));
    const x0=Array.from({length:N},(_,i)=>0.1-0.01*i), y0=Array.from({length:N},(_,i)=>0.05-0.005*i);
    const state0=[...x0, ...y0];
    const f=(t,y)=>{
      const x=y.slice(0,N), yy=y.slice(N,2*N);
      const xbar=x.reduce((s,v)=>s+v,0)/N;
      const dx=new Array(N), dy=new Array(N);
      const Fe0=A*Math.sin(2*Math.PI*fStim*t/1000);
      for(let i=0;i<N;i++){
        const coup=G*(xbar-x[i]);
        const Fe=i===0?Fe0:0;
        dx[i]=(sigmoid(wxx*x[i]-12*yy[i]+PxVals[i]+Fe+coup, SLOPE_X, I0_X)-x[i])/taux;
        dy[i]=(sigmoid(15*x[i]-3*yy[i], SLOPE_Y, I0_Y)-yy[i])/8;
      }
      return dx.concat(dy);
    };
    const sim=integrate(f,state0,steps,dt);
    sim.N=N; sim.Px=PxVals; sim.fStim=fStim;
    return sim;
  },

  // A dedicated, longer, independent simulation just for the power spectrum: the main
  // 500 ms view (dt=0.01 ms) only leaves ~250 ms of "steady state" to analyse, which
  // gives frequency bins ~3-4 Hz apart — coarse enough to look jagged/stair-stepped on
  // a log plot. Running 2000 ms at a coarser dt (still far above Nyquist for these
  // frequencies) gives ~0.4 Hz resolution, matching the reference notebook's approach.
  steadySignalForSpectrum(f, y0, xIndex){
    const {ys}=integrate(f, y0, 100000, 0.02); // 2000 ms
    const col=ys.map(y=>y[xIndex]);
    return col.slice(Math.floor(col.length*0.1));
  },

  plots(variant, p, sim){
    const {ts,ys}=sim;
    const DT_S=0.02/1000; // seconds per sample, for the dedicated spectrum sim
    const {Px,wxx,taux,A,fStim,N,G}=p;

    if(N<=1){
      const isForced=A>0.0001;
      const X=ys.map(y=>y[0]), Y=ys.map(y=>y[1]);
      const tD=downsample(ts,2500), XD=downsample(X,2500), YD=downsample(Y,2500);
      const tail=X.slice(Math.floor(X.length*0.8));
      const yTail=Y.slice(Math.floor(Y.length*0.8));
      const amp=Math.max(...tail)-Math.min(...tail);
      const isOsc=amp>0.01;
      const XppD=downsample(tail,1200), YppD=downsample(yTail,1200);

      const bif=computeBifurcation(wxx,taux);
      const meanX=tail.reduce((a,b)=>a+b,0)/tail.length;
      const regime=wilcoRegimeFromData(amp, meanX);

      const fFFT=(t,[x,y])=>{
        const Fe=A*Math.sin(2*Math.PI*fStim*t/1000);
        return [
          (sigmoid(wxx*x-12*y+Px+Fe, SLOPE_X, I0_X)-x)/taux,
          (sigmoid(15*x-3*y, SLOPE_Y, I0_Y)-y)/8,
        ];
      };
      const steady=this.steadySignalForSpectrum(fFFT,[0.1,0.05],0);
      const sp=powerSpectrum(steady, DT_S);
      const pk=peakFreq(sp.freqs, sp.power, 100);
      const band=bandInfo(pk);
      const mask=sp.freqs.map((f,i)=>f>0&&f<=100?i:-1).filter(i=>i>=0);
      const maxPower=Math.max(...mask.map(i=>sp.power[i]));

      return [
        {data:[
          {x:tD,y:XD,name:'x (excitatory)',line:{color:BLUE,width:1.3}},
          {x:tD,y:YD,name:'y (inhibitory)',line:{color:CORAL,width:1.3}},
        ], layout:lay('Time series','t (ms)','Firing rate'),
          capS:'Excitatory (blue) and inhibitory (red) firing rates over time.',
          capD:wilcoTimeSeriesCaptionFromData(amp, meanX)},

        {data:[ppTrace(XppD,YppD,BLUE,{showlegend:false})],
          layout:layPP('Phase portrait','x (excitatory)','y (inhibitory)'),
          capS:'The trajectory of excitatory vs inhibitory activity.',
          capD: isOsc ? 'Closed loop = self-sustained limit cycle oscillation.' : 'Single dot = no oscillation, the system has settled.'},

        {data:[
          {x:bif.ps,y:bif.amps,mode:'lines',line:{color:BLUE,width:2},showlegend:false},
          {x:[Px,Px],y:[0,Math.max(...bif.amps)*1.1],mode:'lines',line:{color:CORAL,width:2,dash:'dash'},showlegend:false},
        ], layout:lay('Bifurcation diagram','P_x','Amplitude (max − min, x)',{yaxis:{range:[0,Math.max(...bif.amps)*1.15],gridcolor:'#e0e4ef',title:'Amplitude'}}),
          capS:'Oscillation amplitude as input drive Px is swept (A = 0, unforced). The sharp cliff (not a gradual taper) is real: this network snaps out of its limit cycle abruptly rather than fading out smoothly.',
          capD:`Red marker shows your current Px — ${regime.label}.`},

        {data:isForced ? [
            {x:mask.map(i=>sp.freqs[i]),y:mask.map(i=>sp.power[i]),mode:'lines',line:{color:CORAL,width:1.4},showlegend:false},
            {x:[fStim,fStim],y:[0,maxPower*1.15],mode:'lines',line:{color:'#999',width:1.5,dash:'dash'},name:`stimulus ${fStim} Hz`},
          ] : [
            {x:mask.map(i=>sp.freqs[i]),y:mask.map(i=>sp.power[i]),mode:'lines',line:{color:CORAL,width:1.4},showlegend:false},
          ],
          layout:{...lay('Power spectrum','Frequency (Hz)','Power'), ...powerLayout(maxPower)},
          capS:'Energy at each frequency.',
          capD: isOsc ? `Sharp peak at ~${pk.toFixed(0)} Hz — ${band.name}, ${band.note}.` : 'No clear peak — the population is at rest.'},

      ];
    }

    // Network view (N > 1)
    const N_=sim.N, Px_=sim.Px, fStimSim=sim.fStim;
    const Xall=Array.from({length:N_},(_,k)=>ys.map(y=>y[k]));
    const tD=downsample(ts,2500);
    const XallD=Xall.map(X=>downsample(X,2500));
    const amps=Xall.map(X=>{const tail=X.slice(Math.floor(X.length*0.8)); return Math.max(...tail)-Math.min(...tail);});
    const isOsc=amps.some(a=>a>0.01);

    // Would each node oscillate entirely on its own, decoupled, at its own Px? Compare
    // that against what's actually observed in the coupled simulation — a node that
    // wouldn't oscillate alone but IS oscillating here is being entrained (dragged
    // along) by its coupled neighbours, not generating the rhythm itself.
    const bifN=computeBifurcation(wxx,taux);
    const entrained=Px_.map((pv,k)=>bifAmplitudeAt(bifN,pv)<=0.01 && amps[k]>0.01);
    const fFFT=(t,y)=>{
      const x=y.slice(0,N_), yy=y.slice(N_,2*N_);
      const xbar=x.reduce((s,v)=>s+v,0)/N_;
      const dx=new Array(N_), dy=new Array(N_);
      const Fe0=A*Math.sin(2*Math.PI*fStimSim*t/1000);
      for(let i=0;i<N_;i++){
        const coup=G*(xbar-x[i]);
        const Fe=i===0?Fe0:0;
        dx[i]=(sigmoid(wxx*x[i]-12*yy[i]+Px_[i]+Fe+coup, SLOPE_X, I0_X)-x[i])/taux;
        dy[i]=(sigmoid(15*x[i]-3*yy[i], SLOPE_Y, I0_Y)-yy[i])/8;
      }
      return dx.concat(dy);
    };
    const x0N=Array.from({length:N_},(_,i)=>0.1-0.01*i).concat(Array.from({length:N_},(_,i)=>0.05-0.005*i));
    const sps=Array.from({length:N_},(_,k)=>{
      const steady=this.steadySignalForSpectrum(fFFT,x0N,k);
      return powerSpectrum(steady, DT_S);
    });
    const pk0=peakFreq(sps[0].freqs, sps[0].power, 100);
    const band=bandInfo(pk0);
    const mask=sps[0].freqs.map((f,i)=>f>0&&f<=100?i:-1).filter(i=>i>=0);

    // Small multiples — one stacked row per node — instead of overlaying 3 wiggly
    // lines/spectra on top of each other, which becomes unreadable once they cross.
    const tsFig=stackedTraces(
      XallD.map((X,k)=>[{x:tD,y:X,line:{color:PALETTE[k],width:1.3}}]),
      PALETTE, Px_.map((v,k)=>`node ${k}<br>Px=${v.toFixed(2)}`), 't (ms)'
    );
    const spFig=stackedTraces(
      sps.map((s,k)=>{
        const m=s.freqs.map((f,i)=>f>0&&f<=100?i:-1).filter(i=>i>=0);
        const maxP=Math.max(...s.power);
        return [
          {x:m.map(i=>s.freqs[i]),y:m.map(i=>s.power[i]),mode:'lines',line:{color:PALETTE[k],width:1.4}},
          {x:[fStimSim,fStimSim],y:[0,maxP*1.15],mode:'lines',line:{color:'#999',width:1.3,dash:'dash'}},
        ];
      }),
      PALETTE, Px_.map((v,k)=>`node ${k}`), 'Frequency (Hz)'
    );
    return [
      {data:tsFig.data, layout:{...tsFig.layout, title:{text:'Time series (one row per node)',font:{size:11,color:BLUE}}},
        height:340, wide:true,
        capS:'Excitatory firing rate of each Wilson–Cowan node over time — one row per node so overlapping wiggly lines don\'t blur together.',
        capD: isOsc
          ? `Node amplitudes: ${amps.map(a=>a.toFixed(2)).join(', ')}. Coupling G = ${G.toFixed(1)} ties the nodes together.`
            + (entrained.some(Boolean)
              ? ` Node${entrained.filter(Boolean).length>1?'s':''} ${entrained.map((e,k)=>e?k:null).filter(k=>k!==null).join(', ')} would be silent alone (Px too low to self-oscillate) — ${entrained.filter(Boolean).length>1?'they\'re':'it\'s'} only rhythmic here because coupling from its neighbours is driving it, not generating the rhythm itself.`
              : '')
          : 'All nodes have settled — no oscillation.'},

      {data:spFig.data, layout:{...spFig.layout, title:{text:`Power spectrum (one row per node, red = ${fStimSim} Hz stimulus)`,font:{size:11,color:BLUE}}},
        height:340, wide:true,
        capS:'Energy at each frequency, one row per node, so a tall peak on one node doesn\'t squash the others flat.',
        capD: isOsc ? `Node 0 peak at ~${pk0.toFixed(0)} Hz — ${band.name}, ${band.note}.` : 'No clear peak — the network is at rest.'},
    ];
  }
};

// ============================================================
// NMM1 — second-order synapses (Jansen–Rit-style push-pull), §6 Eq. 6.1
// state = [x, ẋ, y, ẏ]; x,y are PSPs (not firing rates); dt = 0.01 s
// ============================================================
// Scalar (no array allocation) RK4 for one (a) sweep point — same technique as WILCO's
// bifurcationCell. Used to trace amplitude vs. loop gain K by varying the sigmoid slope a.
function nmm1AmplitudeAt(tau_x,tau_y,gx,gy,wxy,wyx,a,Fe,T,dt){
  let x=0.05, vx=0, y=0, vy=0;
  const steps=Math.round(T/dt), tailStart=Math.floor(steps*2/3);
  const tx2=tau_x*tau_x, ty2=tau_y*tau_y;
  let tailMax=-Infinity, tailMin=Infinity;
  const deriv=(X,VX,Y,VY)=>[
    VX, (gx*Math.tanh(a*(-wxy*Y+Fe)) - X - 2*tau_x*VX)/tx2,
    VY, (gy*Math.tanh(a*(wyx*X))     - Y - 2*tau_y*VY)/ty2,
  ];
  for(let i=0;i<=steps;i++){
    if(i>=tailStart){ if(x>tailMax) tailMax=x; if(x<tailMin) tailMin=x; }
    const k1=deriv(x,vx,y,vy);
    const k2=deriv(x+0.5*dt*k1[0], vx+0.5*dt*k1[1], y+0.5*dt*k1[2], vy+0.5*dt*k1[3]);
    const k3=deriv(x+0.5*dt*k2[0], vx+0.5*dt*k2[1], y+0.5*dt*k2[2], vy+0.5*dt*k2[3]);
    const k4=deriv(x+dt*k3[0],     vx+dt*k3[1],     y+dt*k3[2],     vy+dt*k3[3]);
    x = x+dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    vx=vx+dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    y = y+dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    vy=vy+dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3]);
  }
  return (tailMax-tailMin)/2;
}
let _nmm1BifCache={key:null,aVals:null,amps:null};
function computeNMM1Bifurcation(tau_x,tau_y,gx,gy,wxy,wyx,Fe){
  const key=[tau_x,tau_y,gx,gy,wxy,wyx,Fe].map(v=>v.toFixed(3)).join('_');
  if(_nmm1BifCache.key===key) return _nmm1BifCache;
  const aVals=[]; for(let a=0.3;a<=3.5001;a+=(3.5-0.3)/24) aVals.push(a);
  const amps=aVals.map(a=>nmm1AmplitudeAt(tau_x,tau_y,gx,gy,wxy,wyx,a,Fe,120,0.02));
  _nmm1BifCache={key,aVals,amps};
  return _nmm1BifCache;
}

const NMM1 = {
  variants:['Single Node','Network'],
  cfg:{
    'Single Node':{
      eqHtml:`<div class="eq-main">τₓ² ẍ + 2τₓ ẋ + x = γₓ σ(−wₓᵧy + Fₑ)</div>
        <div class="eq-main">τᵧ² ÿ + 2τᵧ ẏ + y = γᵧ σ(wᵧₓx)</div>
        <hr class="eq-hr">
        <div class="eq-sub">σ(v) = tanh(a·v) &nbsp;·&nbsp; K = γₓγᵧwₓᵧwᵧₓa²</div>
        <div class="eq-sub">Oscillates when K &gt; K<sub>crit</sub> = 2 + τₓ/τᵧ + τᵧ/τₓ &nbsp;(≥ 4, lowest when τₓ = τᵧ)</div>`,
      explain:'x and y are excitatory/inhibitory post-synaptic potentials, not firing rates — each obeys a critically-damped second-order filter, so a single synapse alone can never oscillate. Once the loop gain K crosses K_crit, the two synapses\' own phase lag is enough to sustain a rhythm with no self-coupling at all (the Barkhausen criterion). Fₑ shifts the operating point on the sigmoid and can quench an oscillation that exists at Fₑ = 0.',
      fixed:{N:1, G:0},
      params:[
        {id:'tau_x', label:'τₓ  (exc. synaptic time)', min:0.05, max:3, step:0.05, def:0.5},
        {id:'tau_y', label:'τᵧ  (inh. synaptic time)', min:0.05, max:3, step:0.05, def:0.5},
        {id:'gx',    label:'γₓ  (exc. synaptic gain)', min:0.1, max:2, step:0.05, def:1},
        {id:'gy',    label:'γᵧ  (inh. synaptic gain)', min:0.1, max:2, step:0.05, def:1},
        {id:'wxy',   label:'wₓᵧ  (I→E, "pull")', min:0.1, max:2, step:0.05, def:1},
        {id:'wyx',   label:'wᵧₓ  (E→I, "push")', min:0.1, max:2, step:0.05, def:1},
        {id:'a',     label:'a  (sigmoid slope)', min:0.3, max:4, step:0.05, def:2.5},
        {id:'Fe',    label:'Fₑ  (exogenous drive)', min:0, max:2, step:0.05, def:0},
      ],
    },
    Network:{
      eqHtml:`<div class="eq-main">τₓ² ẍ<sub>i</sub> + 2τₓ ẋ<sub>i</sub> + x<sub>i</sub> = γₓ σ(−wₓᵧy<sub>i</sub> + Fₑ + G(x̄ − x<sub>i</sub>))</div>
        <div class="eq-main">τᵧ² ÿ<sub>i</sub> + 2τᵧ ẏ<sub>i</sub> + y<sub>i</sub> = γᵧ σ(wᵧₓx<sub>i</sub>)</div>
        <hr class="eq-hr">
        <div class="eq-sub">x̄ = mean over all nodes &nbsp;·&nbsp; G = 0 or N = 1 → exactly the single node</div>`,
      explain:'N copies of the node above, each pulled toward the network mean excitatory PSP x̄ by coupling G, added inside the excitatory sigmoid — a concrete, diffusive instantiation of the paper\'s general connectivity framework (Eq. 6.4–6.5), rather than a full connectivity matrix Cₘₙ. Nodes get a slightly different sigmoid slope a so coupling has something to synchronize. <a href="tutorial.html#coupling" target="_blank">Why this term? →</a>',
      params:[
        {id:'tau_x', label:'τₓ  (exc. synaptic time)', min:0.05, max:3, step:0.05, def:0.5},
        {id:'tau_y', label:'τᵧ  (inh. synaptic time)', min:0.05, max:3, step:0.05, def:0.5},
        {id:'gx',    label:'γₓ  (exc. synaptic gain)', min:0.1, max:2, step:0.05, def:1},
        {id:'gy',    label:'γᵧ  (inh. synaptic gain)', min:0.1, max:2, step:0.05, def:1},
        {id:'wxy',   label:'wₓᵧ  (I→E, "pull")', min:0.1, max:2, step:0.05, def:1},
        {id:'wyx',   label:'wᵧₓ  (E→I, "push")', min:0.1, max:2, step:0.05, def:1},
        {id:'a',     label:'a  (sigmoid slope)', min:0.3, max:4, step:0.05, def:2.5},
        {id:'Fe',    label:'Fₑ  (exogenous drive)', min:0, max:2, step:0.05, def:0},
        {id:'N', label:'N  (network size)', min:2, max:5, step:1, def:3},
        {id:'G', label:'G  (coupling strength)', min:0, max:3, step:0.05, def:0.5},
      ],
    },
  },

  simulate(variant, p){
    const {tau_x,tau_y,gx,gy,wxy,wyx,a,Fe,N,G}=p;
    if(N<=1){
      const f=(t,[x,vx,y,vy])=>{
        const dvx=(gx*Math.tanh(a*(-wxy*y+Fe)) - x - 2*tau_x*vx)/(tau_x*tau_x);
        const dvy=(gy*Math.tanh(a*(wyx*x))     - y - 2*tau_y*vy)/(tau_y*tau_y);
        return [vx,dvx,vy,dvy];
      };
      return integrate(f,[0.05,0,0,0],1500,0.01,2);
    }
    // Networked: N copies of the same node above, each with the coupling term
    // G(x̄−xᵢ) added inside its own excitatory sigmoid. Only the sigmoid slope a
    // is given a small per-node spread — otherwise identical nodes would give G
    // nothing to visibly do.
    const aVals=Array.from({length:N},(_,i)=>a+0.2*(i-(N-1)/2));
    const x0=Array.from({length:N},(_,i)=>0.05*(i%2===0?1:-1)*(1-i*0.1));
    const state0=[...x0, ...Array(N).fill(0), ...Array(N).fill(0), ...Array(N).fill(0)];
    const f=(t,y)=>{
      const x=y.slice(0,N), vx=y.slice(N,2*N), yy=y.slice(2*N,3*N), vy=y.slice(3*N,4*N);
      const xbar=x.reduce((s,v)=>s+v,0)/N;
      const dvx=new Array(N), dvy=new Array(N);
      for(let i=0;i<N;i++){
        const coup=G*(xbar-x[i]);
        dvx[i]=(gx*Math.tanh(aVals[i]*(-wxy*yy[i]+Fe+coup)) - x[i] - 2*tau_x*vx[i])/(tau_x*tau_x);
        dvy[i]=(gy*Math.tanh(aVals[i]*(wyx*x[i]))            - yy[i] - 2*tau_y*vy[i])/(tau_y*tau_y);
      }
      return [...vx, ...dvx, ...vy, ...dvy];
    };
    const sim=integrate(f,state0,2000,0.01,2);
    sim.N=N; sim.aVals=aVals;
    return sim;
  },

  plots(variant, p, sim){
    const {ts,ys}=sim;
    const {tau_x,tau_y,gx,gy,wxy,wyx,a,Fe,N,G}=p;

    if(N<=1){
      const X=ys.map(y=>y[0]), Y=ys.map(y=>y[2]);
      const tD=downsample(ts,2000), XD=downsample(X,2000), YD=downsample(Y,2000);
      const tail=X.slice(Math.floor(X.length*2/3)), tailY=Y.slice(Math.floor(Y.length*2/3));
      const amp=(Math.max(...tail)-Math.min(...tail))/2;
      const isOsc=amp>0.01;
      const XppD=downsample(tail,1200), YppD=downsample(tailY,1200);

      const K=gx*gy*wxy*wyx*a*a;
      const Kcrit=2+tau_x/tau_y+tau_y/tau_x;
      const bif=computeNMM1Bifurcation(tau_x,tau_y,gx,gy,wxy,wyx,Fe);
      const Kvals=bif.aVals.map(av=>gx*gy*wxy*wyx*av*av);
      const maxAmp=Math.max(0.05, ...bif.amps);

      const tsCap = isOsc
        ? `Sustained rhythm — loop gain K = ${K.toFixed(2)} exceeds K_crit = ${Kcrit.toFixed(2)}.`
        : `No sustained rhythm — loop gain K = ${K.toFixed(2)} is below K_crit = ${Kcrit.toFixed(2)}, so both PSPs decay to their fixed point.`;
      const ppCap = isOsc
        ? 'Closed loop = self-sustained limit cycle — no self-coupling needed, the synapses\' own phase lag closes the Barkhausen loop.'
        : 'Single point = no oscillation, the synaptic filters settle to their driven fixed point.';

      return [
        {data:[
          {x:tD,y:XD,name:'x (excitatory PSP)',line:{color:BLUE,width:1.4}},
          {x:tD,y:YD,name:'y (inhibitory PSP)',line:{color:CORAL,width:1.4}},
        ], layout:lay('Time series','t (s)','PSP'),
          capS:'Excitatory (blue) and inhibitory (red) post-synaptic potentials over time.',
          capD:tsCap},
        {data:[ppTrace(XppD,YppD,BLUE,{showlegend:false})],
          layout:layPP('Phase portrait','x (excitatory PSP)','y (inhibitory PSP)'),
          capS:'Trajectory of excitatory vs inhibitory PSP.',
          capD:ppCap},
        {data:[
          {x:Kvals,y:bif.amps,mode:'lines',line:{color:BLUE,width:2.2},showlegend:false},
          {x:[Kcrit,Kcrit],y:[0,maxAmp*1.15],mode:'lines',line:{color:CORAL,width:1.5,dash:'dot'},name:`K_crit = ${Kcrit.toFixed(2)}`},
          {x:[K],y:[amp],mode:'markers',marker:{color:'#FF6F00',size:10},name:`current K = ${K.toFixed(2)}`},
        ], layout:lay('Bifurcation diagram','loop gain K = γₓγᵧwₓᵧwᵧₓa²','long-run amplitude of x',{yaxis:{range:[0,maxAmp*1.2],gridcolor:'#e0e4ef',title:'amplitude'}}),
          capS:'Long-run amplitude of x as the loop gain K is swept by varying the sigmoid slope a (τₓ,τᵧ,γₓ,γᵧ,wₓᵧ,wᵧₓ,Fₑ held at their current slider values).',
          capD:`Onset (Hopf bifurcation) at K_crit = 2+τₓ/τᵧ+τᵧ/τₓ = ${Kcrit.toFixed(2)} — lowest when the two synapses are matched (τₓ=τᵧ).`},
      ];
    }

    // Network view (N > 1)
    const N_=sim.N, aVals=sim.aVals;
    const Xall=Array.from({length:N_},(_,k)=>ys.map(y=>y[k]));
    const tD=downsample(ts,2000);
    const XallD=Xall.map(X=>downsample(X,2000));
    const amps=Xall.map(X=>{const tail=X.slice(Math.floor(X.length*0.75)); return (Math.max(...tail)-Math.min(...tail))/2;});
    const isOsc=amps.some(a=>a>0.01);
    const tail0=Xall[0].slice(Math.floor(Xall[0].length*0.75));
    const tailY0=ys.map(y=>y[2*N_]).slice(Math.floor(ys.length*0.75));

    const tsFig=stackedTraces(
      XallD.map((X,k)=>[{x:tD,y:X,line:{color:PALETTE[k%PALETTE.length],width:1.3}}]),
      PALETTE, aVals.map((v,k)=>`node ${k}<br>a=${v.toFixed(2)}`), 't (s)'
    );
    return [
      {data:tsFig.data, layout:{...tsFig.layout, title:{text:'Time series (one row per node)',font:{size:11,color:BLUE}}},
        height:320, wide:true,
        capS:'Excitatory PSP of each NMM1 node — one row per node so overlapping rhythms don\'t blur together.',
        capD: isOsc
          ? `Node amplitudes: ${amps.map(a=>a.toFixed(2)).join(', ')}. Coupling G = ${G.toFixed(2)} pulls nodes with different excitability (a) toward a shared rhythm.`
          : 'All nodes have settled — no oscillation.'},
      {data:[ppTrace(downsample(tail0,1000),downsample(tailY0,1000),BLUE,{showlegend:false})],
        layout:layPP('Phase portrait — node 0','x (excitatory PSP)','y (inhibitory PSP)'),
        capS:'Trajectory of node 0\'s excitatory vs inhibitory PSP.',
        capD: isOsc ? 'Closed loop = node 0 is oscillating.' : 'Single point = node 0 has settled.'},
    ];
  }
};

// ============================================================
// NMM2 — next-generation mean field (Montbrió–Pazó–Roxin), §7 Eq. 7.4–7.13
// Exact QIF reduction: state = [rₓ, vₓ, rᵧ, vᵧ]; r = firing rate, v = mean
// membrane potential; instantaneous synapses (s = r); dimensionless (τ = 1).
// ============================================================
const PISQ = Math.PI * Math.PI;

// Scalar (no array allocation) RK4 for one I-sweep point — returns the long-run
// amplitude of the excitatory firing rate rₓ. Same technique as NMM1's sweep.
function nmm2AmplitudeAt(eta, delta, Jx, Cxy, Cyx, I, T, dt){
  let rx=0.3, vx=-2, ry=0.1, vy=-2;
  const steps=Math.round(T/dt), tailStart=Math.floor(steps*0.6), dpi=delta/Math.PI;
  const deriv=(RX,VX,RY,VY)=>[
    dpi + 2*RX*VX,
    VX*VX - PISQ*RX*RX + eta + Jx*RX - Cxy*RY + I,
    dpi + 2*RY*VY,
    VY*VY - PISQ*RY*RY + eta + Cyx*RX,
  ];
  let tailMax=-Infinity, tailMin=Infinity;
  for(let i=0;i<=steps;i++){
    if(i>=tailStart){ if(rx>tailMax) tailMax=rx; if(rx<tailMin) tailMin=rx; }
    const k1=deriv(rx,vx,ry,vy);
    const k2=deriv(rx+0.5*dt*k1[0], vx+0.5*dt*k1[1], ry+0.5*dt*k1[2], vy+0.5*dt*k1[3]);
    const k3=deriv(rx+0.5*dt*k2[0], vx+0.5*dt*k2[1], ry+0.5*dt*k2[2], vy+0.5*dt*k2[3]);
    const k4=deriv(rx+dt*k3[0], vx+dt*k3[1], ry+dt*k3[2], vy+dt*k3[3]);
    rx=rx+dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    vx=vx+dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    ry=ry+dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    vy=vy+dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3]);
    if(!isFinite(rx) || Math.abs(rx)>1e4) return NaN;
  }
  return (tailMax-tailMin)/2;
}
let _nmm2BifCache={key:null,Is:null,amps:null};
function computeNMM2Bifurcation(eta,delta,Jx,Cxy,Cyx){
  const key=[eta,delta,Jx,Cxy,Cyx].map(v=>v.toFixed(3)).join('_');
  if(_nmm2BifCache.key===key) return _nmm2BifCache;
  const Is=[]; for(let I=-8;I<=12.0001;I+=(12+8)/28) Is.push(I);
  const amps=Is.map(I=>nmm2AmplitudeAt(eta,delta,Jx,Cxy,Cyx,I,50,0.02));
  _nmm2BifCache={key,Is,amps};
  return _nmm2BifCache;
}

const NMM2 = {
  variants:['Single Node','Network'],
  cfg:{
    'Single Node':{
      eqHtml:`<div class="eq-main">ṙₓ = Δ/π + 2rₓvₓ &nbsp;·&nbsp; v̇ₓ = vₓ² − π²rₓ² + η̄ + Jₓrₓ − Cₓᵧrᵧ + I</div>
        <div class="eq-main">ṙᵧ = Δ/π + 2rᵧvᵧ &nbsp;·&nbsp; v̇ᵧ = vᵧ² − π²rᵧ² + η̄ + Cᵧₓrₓ</div>
        <hr class="eq-hr">
        <div class="eq-sub">r = firing rate, v = mean membrane potential &nbsp;·&nbsp; instantaneous synapses (s = r) &nbsp;·&nbsp; dimensionless (τ = 1)</div>`,
      explain:'The exact mean field of a population of spiking quadratic integrate-and-fire (QIF) neurons: instead of a static sigmoid, the firing rate r and mean membrane potential v obey two coupled ODEs per population (Montbrió–Pazó–Roxin). Δ is the spread of neuron excitabilities, η̄ their average, Jₓ the excitatory self-coupling, and Cₓᵧ/Cᵧₓ the I→E / E→I cross-couplings. Raise the input I and the E–I loop crosses a Hopf bifurcation into a self-sustained (PING) rhythm — no assumed sigmoid anywhere.',
      fixed:{N:1, G:0},
      params:[
        {id:'eta',   label:'η̄  (mean excitability)', min:-10, max:10, step:0.5, def:0},
        {id:'delta', label:'Δ  (excitability spread)', min:0.1, max:3, step:0.05, def:1},
        {id:'Jx',    label:'Jₓ  (E self-coupling)', min:0, max:25, step:0.5, def:15},
        {id:'Cxy',   label:'Cₓᵧ  (I→E)', min:0, max:20, step:0.5, def:8},
        {id:'Cyx',   label:'Cᵧₓ  (E→I)', min:0, max:20, step:0.5, def:8},
        {id:'I',     label:'I  (external input)', min:-8, max:12, step:0.25, def:4},
      ],
    },
    Network:{
      eqHtml:`<div class="eq-main">v̇ₓ<sup>(i)</sup> = (vₓ<sup>(i)</sup>)² − π²(rₓ<sup>(i)</sup>)² + η̄<sub>i</sub> + Jₓrₓ<sup>(i)</sup> − Cₓᵧrᵧ<sup>(i)</sup> + G·r̄ₓ + I</div>
        <div class="eq-main">(the r-equations and the inhibitory population are as in the single node)</div>
        <hr class="eq-hr">
        <div class="eq-sub">r̄ₓ = mean excitatory rate &nbsp;·&nbsp; long-range coupling is excitatory→excitatory &nbsp;·&nbsp; G = 0 → independent nodes</div>`,
      explain:'N copies of the node above with a small spread of excitability η̄, coupled excitatory→excitatory: each node\'s mean-voltage equation gains G·r̄ₓ, the paper\'s additive E→E connectome term (Eq. 7.13) specialised to uniform all-to-all connectivity. A node held below its own Hopf point can be dragged into rhythm by its oscillating neighbours. <a href="tutorial.html#coupling" target="_blank">Why this term? →</a>',
      params:[
        {id:'eta',   label:'η̄  (mean excitability)', min:-10, max:10, step:0.5, def:0},
        {id:'delta', label:'Δ  (excitability spread)', min:0.1, max:3, step:0.05, def:1},
        {id:'Jx',    label:'Jₓ  (E self-coupling)', min:0, max:25, step:0.5, def:15},
        {id:'Cxy',   label:'Cₓᵧ  (I→E)', min:0, max:20, step:0.5, def:8},
        {id:'Cyx',   label:'Cᵧₓ  (E→I)', min:0, max:20, step:0.5, def:8},
        {id:'I',     label:'I  (external input)', min:-8, max:12, step:0.25, def:4},
        {id:'N', label:'N  (network size)', min:2, max:5, step:1, def:3},
        {id:'G', label:'G  (E→E coupling strength)', min:0, max:3, step:0.05, def:0.5},
      ],
    },
  },

  simulate(variant, p){
    const {eta,delta,Jx,Cxy,Cyx,I,N,G}=p;
    const dpi=delta/Math.PI;
    if(N<=1){
      const f=(t,[rx,vx,ry,vy])=>[
        dpi + 2*rx*vx,
        vx*vx - PISQ*rx*rx + eta + Jx*rx - Cxy*ry + I,
        dpi + 2*ry*vy,
        vy*vy - PISQ*ry*ry + eta + Cyx*rx,
      ];
      return integrate(f,[0.3,-2,0.1,-2],4000,0.01,4);
    }
    // Networked: N copies with a small η̄ spread (so coupling has something to
    // synchronize), coupled E→E by the additive term G·r̄ₓ (Eq. 7.13, uniform C).
    const etas=Array.from({length:N},(_,i)=>eta+2.5*(i-(N-1)/2));
    const r0=Array.from({length:N},(_,i)=>0.3-0.03*i);
    const state0=[...r0, ...Array(N).fill(-2), ...Array(N).fill(0.1), ...Array(N).fill(-2)];
    const f=(t,y)=>{
      const rx=y.slice(0,N), vx=y.slice(N,2*N), ry=y.slice(2*N,3*N), vy=y.slice(3*N,4*N);
      let s=0; for(let i=0;i<N;i++) s+=rx[i]; const rbar=s/N;
      const drx=new Array(N), dvx=new Array(N), dry=new Array(N), dvy=new Array(N);
      for(let i=0;i<N;i++){
        const coup=G*rbar;
        drx[i]=dpi + 2*rx[i]*vx[i];
        dvx[i]=vx[i]*vx[i] - PISQ*rx[i]*rx[i] + etas[i] + Jx*rx[i] - Cxy*ry[i] + coup + I;
        dry[i]=dpi + 2*ry[i]*vy[i];
        dvy[i]=vy[i]*vy[i] - PISQ*ry[i]*ry[i] + etas[i] + Cyx*rx[i];
      }
      return [...drx, ...dvx, ...dry, ...dvy];
    };
    const sim=integrate(f,state0,4000,0.01,4);
    sim.N=N; sim.etas=etas;
    return sim;
  },

  plots(variant, p, sim){
    const {ts,ys}=sim;
    const {eta,delta,Jx,Cxy,Cyx,I,N,G}=p;

    if(N<=1){
      const rx=ys.map(y=>y[0]), vx=ys.map(y=>y[1]), ry=ys.map(y=>y[2]);
      const tD=downsample(ts,2000), rxD=downsample(rx,2000), ryD=downsample(ry,2000);
      const tailR=rx.slice(Math.floor(rx.length*0.6)), tailV=vx.slice(Math.floor(vx.length*0.6));
      const amp=(Math.max(...tailR)-Math.min(...tailR))/2;
      const isOsc=amp>0.05;
      const rppD=downsample(tailR,1200), vppD=downsample(tailV,1200);

      const bif=computeNMM2Bifurcation(eta,delta,Jx,Cxy,Cyx);
      const maxAmp=Math.max(0.05,...bif.amps.filter(a=>isFinite(a)));
      let Ihopf=null;
      for(let i=0;i<bif.Is.length;i++){ if(isFinite(bif.amps[i])&&bif.amps[i]>0.05){ Ihopf=bif.Is[i]; break; } }
      const onsetTxt = Ihopf!==null ? ` (≈ ${Ihopf.toFixed(1)})` : '';

      const bifData=[
        {x:bif.Is,y:bif.amps,mode:'lines',line:{color:BLUE,width:2.2},showlegend:false},
        {x:[I],y:[amp],mode:'markers',marker:{color:'#FF6F00',size:10},name:`current I = ${I.toFixed(2)}`},
      ];
      if(Ihopf!==null) bifData.splice(1,0,{x:[Ihopf,Ihopf],y:[0,maxAmp*1.15],mode:'lines',line:{color:CORAL,width:1.5,dash:'dot'},name:`Hopf onset ≈ ${Ihopf.toFixed(1)}`});

      return [
        {data:[
          {x:tD,y:rxD,name:'rₓ (excitatory rate)',line:{color:BLUE,width:1.4}},
          {x:tD,y:ryD,name:'rᵧ (inhibitory rate)',line:{color:CORAL,width:1.4}},
        ], layout:lay('Time series','t (τ, dimensionless)','firing rate r'),
          capS:'Excitatory (blue) and inhibitory (red) population firing rates from the exact QIF mean field.',
          capD: isOsc
            ? `Self-sustained PING rhythm — input I = ${I.toFixed(2)} is past the Hopf onset${onsetTxt}.`
            : `At rest — input I = ${I.toFixed(2)} is below the Hopf onset${onsetTxt}, so r and v settle to a fixed point.`},
        {data:[ppTrace(rppD,vppD,BLUE,{showlegend:false})],
          layout:layPP('Phase portrait (r, v)','rₓ (firing rate)','vₓ (mean membrane potential)'),
          capS:'Trajectory of excitatory firing rate rₓ against mean membrane potential vₓ.',
          capD: isOsc
            ? 'Closed loop in the (r, v) plane — a genuine limit cycle out of the exact mean field, with no static sigmoid involved.'
            : 'Single point — the exact (r, v) dynamics have settled to a fixed point.'},
        {data:bifData,
          layout:lay('Bifurcation diagram','external input I','long-run amplitude of rₓ',{yaxis:{range:[0,maxAmp*1.2],gridcolor:'#e0e4ef',title:'amplitude'}}),
          capS:'Long-run amplitude of the excitatory firing rate as the external input I is swept (η̄, Δ, Jₓ, Cₓᵧ, Cᵧₓ held at their slider values).',
          capD:`Increasing I switches the E–I loop on through a Hopf bifurcation${Ihopf!==null?` at I ≈ ${Ihopf.toFixed(1)}`:''} — the next-generation analogue of the earlier models' oscillation onset.`},
      ];
    }

    // Network view (N > 1)
    const N_=sim.N, etas=sim.etas;
    const Rall=Array.from({length:N_},(_,k)=>ys.map(y=>y[k]));
    const tD=downsample(ts,2000);
    const RallD=Rall.map(R=>downsample(R,2000));
    const amps=Rall.map(R=>{const tl=R.slice(Math.floor(R.length*0.6)); return (Math.max(...tl)-Math.min(...tl))/2;});
    const isOsc=amps.some(a=>a>0.05);
    const tail0=Rall[0].slice(Math.floor(Rall[0].length*0.6));
    const tailV0=ys.map(y=>y[N_]).slice(Math.floor(ys.length*0.6));

    const tsFig=stackedTraces(
      RallD.map((R,k)=>[{x:tD,y:R,line:{color:PALETTE[k%PALETTE.length],width:1.3}}]),
      PALETTE, etas.map((v,k)=>`node ${k}<br>η̄=${v.toFixed(1)}`), 't (τ)'
    );
    return [
      {data:tsFig.data, layout:{...tsFig.layout, title:{text:'Time series (one row per node)',font:{size:11,color:BLUE}}},
        height:320, wide:true,
        capS:'Excitatory firing rate of each NMM2 node — one row per node so overlapping rhythms don\'t blur together.',
        capD: isOsc
          ? `Node amplitudes: ${amps.map(a=>a.toFixed(2)).join(', ')}. E→E coupling G = ${G.toFixed(2)} pulls nodes of different excitability η̄ toward a shared rhythm.`
          : 'All nodes have settled — no oscillation.'},
      {data:[ppTrace(downsample(tail0,1000),downsample(tailV0,1000),BLUE,{showlegend:false})],
        layout:layPP('Phase portrait — node 0','rₓ (firing rate)','vₓ (mean membrane potential)'),
        capS:'Trajectory of node 0\'s excitatory firing rate vs mean membrane potential.',
        capD: isOsc ? 'Closed loop = node 0 is oscillating.' : 'Single point = node 0 has settled.'},
    ];
  }
};
