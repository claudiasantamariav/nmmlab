sl: {
  title: 'Stuart–Landau Oscillator (SL)',
  tagline: 'The HO gains a cubic nonlinearity — amplitude becomes self-regulating instead of just marginally stable.',
  equations: `
    <div class="info-eq-box">
      <div class="eq-name">Polar form (§3, Eq. 3.1–3.2)</div>
      <div class="eq-main">ṙ = αr − γr³,  θ̇ = ω − βr²</div>
      <div class="eq-note">The linear terms (α, ω) drive growth and rotation; the nonlinear terms (γ, β) self-regulate amplitude and frequency.</div>
    </div>
    <div class="info-eq-box">
      <div class="eq-name">Complex form (Eq. 3.6)</div>
      <div class="eq-main">ż = (α + iω)z − (γ + iβ)|z|²z</div>
      <div class="eq-note">Stable amplitude when α &gt; 0: r* = √(α/γ).</div>
    </div>
    <div class="info-eq-box">
      <div class="eq-name">Forced (Eq. 3.7)</div>
      <div class="eq-main">ż = (α + iω)z − (γ + iβ)|z|²z + F(t)</div>
    </div>
    <div class="info-eq-box">
      <div class="eq-name">Coupled network (Eq. 3.8–3.9)</div>
      <div class="eq-main">Eq. 3.8 (all-to-all): żᵢ = (α + iωᵢ)zᵢ − (γ + iβ)|zᵢ|²zᵢ + (G/N) Σⱼ(zⱼ − zᵢ) + F̂ₑ,ᵢ(t)</div>
      <div class="eq-main">Eq. 3.9 (general): żᵢ = (α + iωᵢ)zᵢ − (γ + iβ)|zᵢ|²zᵢ + G Σⱼ Cᵢⱼ(zⱼ − zᵢ) + F̂ₑ,ᵢ(t)</div>
      <div class="eq-note">Eq. 3.8 is the uniform, all-to-all special case (Cᵢⱼ = 1/N); Eq. 3.9 generalizes to a weighted connectome, with no 1/N factor.</div>
    </div>`,
  how: `<p>Purely linear oscillators like the HO can't describe real neural rhythms on their own: without some regulating nonlinearity, activity would either grow without bound or decay to nothing. The Stuart–Landau oscillator adds the simplest possible fix — a cubic term −γ|z|²z — that grows the same way as the HO for small amplitudes but pushes back once |z| gets large. The result is a genuine <em>limit cycle</em>: for α &gt; 0 the amplitude relaxes onto a fixed radius r* = √(α/γ) regardless of where it started, unlike the HO's neutral circle whose size is set entirely by the initial condition.</p>
    <p>This is the normal form of a Hopf bifurcation — the minimal, universal model for any system transitioning from a damped fixed point to a self-sustained oscillation. Forcing displaces the limit cycle to a new operating point; coupling many SL nodes diffusively (each pulled toward the network average) produces synchronization, clustering, and even "amplitude death," while the cubic term keeps every node's amplitude bounded.</p>`,
  params: [
    {name:'α (alpha)', unit:'s⁻¹', meaning:'Bifurcation parameter (linear growth/decay)', effect:'α &lt; 0 → damped, noise-driven fluctuations; α &gt; 0 → self-sustained limit cycle of radius √(α/γ).'},
    {name:'ω (omega)', unit:'rad/s', meaning:'Intrinsic angular frequency', effect:'Sets the base rotation rate, further shifted by β once amplitude grows.'},
    {name:'γ (gamma) &gt; 0', unit:'s⁻¹·a.u.⁻²', meaning:'Nonlinear amplitude saturation', effect:'Caps the limit-cycle radius; larger γ → smaller stable amplitude for the same α.'},
    {name:'β (beta)', unit:'rad·s⁻¹·a.u.⁻²', meaning:'Amplitude–phase coupling ("shear")', effect:'Couples amplitude to instantaneous frequency; captures nonlinear dispersion effects absent from the HO.'},
    {name:'F(t)', unit:'a.u./s', meaning:'External forcing', effect:'Displaces the limit cycle to a new fixed point; periodic forcing yields nonlinear phase locking.'},
    {name:'G, Cᵢⱼ', unit:'s⁻¹ (G); dimensionless (Cᵢⱼ)', meaning:'Coupling gain and connectivity', effect:'Diffusive coupling toward the network mean; drives synchronization, clustering, amplitude death.'},
  ],
  buildup: [
    {id:'bifurcation', step:1, title:'Undamped / damped — α crosses zero', param:'alpha', startVal:0,
     fixed:{omega:2, gamma:1, beta:0, F0:0, G:0, N:1},
     prose:'SL doesn\'t have a literal undamped case the way the HO does — the cubic term is always there — but α still governs the same basic split between a damped system and a self-sustained one. Drag it through zero: below zero the oscillator is damped, every trajectory decaying back to the origin (r = 0 is the only, stable, fixed point); above zero it becomes self-sustained — that fixed point loses stability and a genuine limit cycle appears at r* = √(α/γ). This Hopf bifurcation is the one mechanism the whole SL model is built around.'},
    {id:'forced', step:2, title:'Forced / unforced', param:'F0', startVal:0,
     fixed:{alpha:1, omega:2, gamma:1, beta:0, omega_drive:2, G:0, N:1},
     prose:'With α now fixed at 1 (past the bifurcation, so a self-sustained limit cycle already exists), drag the forcing amplitude F₀ up from 0. At F₀ = 0 the oscillator is unforced, settling onto its natural limit cycle at r* = √(α/γ); turning up F₀ adds a periodic drive at frequency Ω that pulls the amplitude and phase away from that natural rhythm. Same forced/unforced distinction as the HO\'s own Forced variant (Eq. 2.11), now acting on a genuinely nonlinear limit cycle instead of a linear spiral.'},
    {id:'coupling', step:3, title:'Coupled network', param:'G', startVal:0,
     fixed:{alpha:1, gamma:1, beta:0, omega:2, F0:0, N:3},
     prose:'Finally, turn forcing back off and connect three of these limit-cycle oscillators — each with a slightly different natural frequency — and drag G. At G = 0 they run independently, each at its own pace; diffusive coupling toward the network mean pulls them toward a shared rhythm as G increases. Same synchronization mechanism as the HO\'s coupled case, but now every node\'s amplitude is self-stabilized by γ rather than fixed by its initial condition.'},
  ],
  about: `Stuart–Landau traces back to Landau's 1944 model of the laminar-turbulent transition and Stuart's rigorous derivation for shear flows — it is now understood as <em>the</em> normal form of a Hopf bifurcation. <strong>Castaldo et al.</strong> place it directly above the HO on the ladder: same push-pull skeleton, now with a physiologically essential self-limiting mechanism. SL networks tuned near their Hopf bifurcation are widely used to reproduce resting-state functional connectivity and its variability (FCD) in whole-brain fMRI and MEG models.`,
},

wilco: {
  title: 'Wilson–Cowan Model (WILCO)',
  tagline: 'The HO/SL push-pull motif made biological: excitatory and inhibitory firing rates interacting through a sigmoid.',
  equations: `
    <div class="info-eq-box">
      <div class="eq-name">Unforced, firing-rate form (§5, Eq. 5.2)</div>
      <div class="eq-main">τₓẋ + x = σₓ(wₓₓx − wₓᵧy + Pₓ)</div>
      <div class="eq-main">τᵧẏ + y = σᵧ(wᵧₓx − wᵧᵧy)</div>
    </div>
    <div class="info-eq-box">
      <div class="eq-name">Forced (§5.1, Eq. 5.3)</div>
      <div class="eq-main">τₓẋ + x = σₓ(wₓₓx − wₓᵧy + Pₓ + F̂ₑ(t))</div>
      <div class="eq-note">Near the Hopf bifurcation this behaves like a forced SL oscillator; sinusoidal forcing produces n:m phase-locking.</div>
    </div>
    <div class="info-eq-box">
      <div class="eq-name">Network (§5.3, Eq. 5.5)</div>
      <div class="eq-main">τₓẋᵢ + xᵢ = σₓ(wₓₓxᵢ − wₓᵧyᵢ + Pₓ,ᵢ + F̂ₑ,ᵢ(t) + Σⱼ Cᵢⱼxⱼ)</div>
      <div class="eq-main">τᵧẏᵢ + yᵢ = σᵧ(wᵧₓxᵢ − wᵧᵧyᵢ)</div>
      <div class="eq-note">Long-range excitatory coupling Σⱼ Cᵢⱼxⱼ enters additively inside the sigmoid.</div>
    </div>
    <div class="info-eq-box" style="border-left-color:var(--coral);">
      <div class="eq-name" style="color:var(--coral);">In the Demo</div>
      <div class="eq-note" style="font-size:0.85rem;">Unforced and forced are the same equation with F₀ = 0 or not, so the Demo tab combines them into one "Single Node" variant — set A = 0 to remove the rhythmic stimulus. Coupling is structurally different (multiple nodes, a mean-field term), so it gets its own "Network" variant instead of a slider on this one. That variant writes the coupling as G(x̄ − xᵢ) — a diffusive simplification of the paper's row-summed GΣⱼCᵢⱼxⱼ that keeps each node's coupling input centered on the network average and bounded regardless of network size N, rather than growing with it — see the <a href="tutorial.html#coupling" target="_blank">Tutorial</a>.</div>
    </div>`,
  how: `<p>WILCO replaces the HO/SL's abstract complex number with two concrete, biologically legible variables: an excitatory firing rate x and an inhibitory firing rate y, wired together through a sigmoid σ(·) instead of a simple linear term. Turning up the tonic drive Pₓ moves the operating point along the steep part of the sigmoid; the paper shows a Hopf bifurcation needs three ingredients — reciprocal E–I coupling (wₓᵧwᵧₓ &lt; 0), enough self-excitation or drive to sit on the steep part of σ, and the sigmoid's curvature to supply the cubic term that caps the oscillation's growth.</p>
    <p>Once those conditions are met, the fixed point destabilizes and a self-sustained limit-cycle rhythm switches on spontaneously — no external clock required. Near that bifurcation point, a Taylor expansion of the WILCO equations recovers exactly the Stuart–Landau normal form (§5.2, Eq. 5.4): the sigmoid's first derivative sets the linear gain, and its second derivative supplies the nonlinear term that stabilizes the limit cycle. This is why the paper describes WILCO as "SL in disguise" — the same universal bifurcation machinery, now anchored to measurable biophysical quantities.</p>`,
  params: [
    {name:'τₓ, τᵧ', unit:'ms', meaning:'Membrane/synaptic time constants', effect:'Sets how fast each population responds; the E–I timescale separation shapes the oscillation frequency.'},
    {name:'wₓₓ', unit:'dimensionless', meaning:'E→E weight (self-excitation)', effect:'Needed (with drive) to push the operating point onto the steep part of the sigmoid.'},
    {name:'wₓᵧ, wᵧₓ', unit:'dimensionless', meaning:'I→E and E→I weights', effect:'Reciprocal coupling; wₓᵧwᵧₓ &lt; 0 is required for a Hopf bifurcation to exist at all.'},
    {name:'wᵧᵧ', unit:'dimensionless', meaning:'I→I weight (self-inhibition)', effect:'Additional damping on the inhibitory population.'},
    {name:'Pₓ', unit:'dimensionless (normalized input current)', meaning:'Tonic drive to the excitatory population', effect:'The bifurcation control parameter — sweeping it switches the oscillation on and off (Hopf onset).'},
    {name:'σ(·)', unit:'dimensionless → dimensionless (0–1)', meaning:'Sigmoid transfer function (slope, threshold)', effect:'Converts total input current to a bounded firing rate; its curvature is what stabilizes the limit cycle.'},
    {name:'F̂ₑ(t)', unit:'dimensionless (same units as Pₓ)', meaning:'External / rhythmic forcing on the excitatory population', effect:'Entrains the network; near Hopf, periodic forcing produces phase-locking regions.'},
    {name:'G, Cᵢⱼ', unit:'dimensionless', meaning:'Coupling gain and (row-normalized) connectivity', effect:'Long-range excitatory drive from other nodes, added inside the sigmoid of the receiving node.'},
  ],
  buildup: [
    {id:'onset', step:1, title:'Unforced, uncoupled — cross the Hopf bifurcation', param:'Px', startVal:0,
     fixed:{wxx:16, taux:8, A:0, N:1, G:0},
     prose:'Start with no background drive at all (Pₓ = 0, node silent) and drag Pₓ up. Pₓ is a constant background current that shifts where the excitatory population sits on the sigmoid; with self-excitation wₓₓ fixed high enough behind the scenes, turning up Pₓ eventually destabilizes the fixed point — a Hopf bifurcation switches on a self-sustained limit-cycle rhythm with no external clock required. This is WILCO\'s version of the HO\'s undamped/damped split: below the threshold, silence; above it, a sustained rhythm.'},
    {id:'forced', step:2, title:'Forced — rhythmic entrainment', param:'A', startVal:0,
     fixed:{Px:1.5, wxx:16, taux:8, fStim:24, N:1, G:0},
     prose:'With the node already oscillating on its own (Pₓ and wₓₓ fixed past the bifurcation), drag the forcing amplitude A up from 0. A turns on a rhythmic external stimulus at fₛₜᵢₘ = 24 Hz, added to the excitatory population\'s input. A large enough A can entrain the network to the stimulus frequency, pulling it away from its own natural rhythm.'},
    {id:'coupled', step:3, title:'Coupled network', param:'G', startVal:0,
     fixed:{Px:1.5, wxx:16, taux:8, A:0, N:3},
     prose:'Finally, turn forcing back off and instead connect three nodes with slightly different drive Pₓ, and drag the coupling gain G. At G = 0 each node oscillates — or stays silent — purely on its own; strong enough coupling can pull a node that would be silent alone into a shared rhythm, entrained by its neighbours rather than generating the rhythm itself.'},
  ],
  about: `Wilson and Cowan introduced this model in the early 1970s as the first tractable mean-field description of interacting excitatory and inhibitory populations, and it remains a modeling workhorse today — from single microcircuits to whole-brain simulations fit to MEG, EEG, and fMRI. <strong>Castaldo et al.</strong> place WILCO directly above Stuart–Landau on the ladder: the same Hopf-bifurcation machinery, but every coefficient is now anchored to a measurable biophysical quantity (a synaptic weight, a time constant, a drive current) rather than an abstract normal-form parameter.`,
},

nmm1: {
  title: 'NMM with Second-Order Synapses (NMM1)',
  tagline: 'Jansen–Rit-style models: synapses get their own realistic rise/decay filter instead of collapsing into one firing-rate equation.',
  equations: `
    <div class="info-eq-box">
      <div class="eq-name">E–I pair, without self-coupling (§6, Eq. 6.1)</div>
      <div class="eq-main">τₓ² ẍ + 2τₓ ẋ + x = γₓ σ(−wₓᵧy + F̂ₑ)</div>
      <div class="eq-main">τᵧ² ÿ + 2τᵧ ẏ + y = γᵧ σ(wᵧₓx)</div>
      <div class="eq-note">Second-order synaptic filters (distinct rise/decay) supply the phase lag needed for sustained oscillation — no self-coupling required.</div>
    </div>
    <div class="info-eq-box">
      <div class="eq-name">General network (Eq. 6.4–6.5)</div>
      <div class="eq-main">L̂ₘₙ[uₘₙ] = Cₘₙ rₙ,&nbsp;&nbsp; vₘ = Σₙ uₘₙ + [field terms],&nbsp;&nbsp; rₘ = σₘ(vₘ)</div>
      <div class="eq-note">A synapse filter turns each incoming firing rate into a PSP; PSPs sum into a membrane perturbation; a sigmoid converts that back into a firing rate.</div>
    </div>
    <div class="info-eq-box" style="border-left-color:var(--coral);">
      <div class="eq-name" style="color:var(--coral);">In the Demo</div>
      <div class="eq-note" style="font-size:0.85rem;">The L̂/C formalism above is deliberately general — it doesn't commit to a specific connectivity, and §5.3 (which NMM1's Eq. 6.5 mirrors) is explicit that the paper's own coupling is additive, not diffusive: each node sums weighted inputs from its neighbours, Σⱼ Cᵢⱼxⱼ, specifically because this avoids the homeostatic constraints of diffusive schemes. For consistency with every other model on this site, the interactive demo instead instantiates a diffusive simplification: a "Network" variant adds G(x̄ − xᵢ) inside the excitatory sigmoid, pulling each node toward the network's mean excitatory PSP x̄ rather than summing a full connectivity matrix — see the <a href="tutorial.html#coupling" target="_blank">Tutorial</a>.</div>
    </div>`,
  how: `<p>WILCO's single firing-rate equation implicitly assumes synaptic transmission is instantaneous. NMM1 makes it explicit: each post-synaptic potential is the output of a proper linear filter with its own rise and decay time constants, not just a first-order lag. Multiple PSPs are then summed into a membrane perturbation v, and a static sigmoid converts that perturbation into an output firing rate — cleanly separating "synapse" (the filter) from "soma" (the sigmoid).</p>
    <p>The payoff is that a second-order synaptic filter introduces its own frequency-dependent phase shift. By the Barkhausen stability criterion, a feedback loop oscillates once its total gain is 1 and its total phase shift is a multiple of 360°; in a push-pull E–I loop, the phase lag from realistic synaptic kinetics alone can satisfy that condition — so, unlike Wilson–Cowan, NMM1 can sustain oscillations without any explicit self-coupling term.</p>`,
  params: [
    {name:'x, y', unit:'mV', meaning:'Excitatory / inhibitory post-synaptic potentials (PSPs)', effect:'Outputs of the second-order synaptic filters — not firing rates themselves.'},
    {name:'τₓ, τᵧ (or rise/decay pairs)', unit:'ms', meaning:'Synaptic time constants', effect:'Set each synapse\'s resonance frequency and intrinsic phase lag; distinct rise/decay values are what let phase lag accumulate.'},
    {name:'γₓ, γᵧ', unit:'mV', meaning:'Synaptic gains', effect:'Scale PSP amplitude for each synapse type.'},
    {name:'wₓᵧ, wᵧₓ', unit:'dimensionless', meaning:'Local E→I / I→E coupling', effect:'The push-pull loop; self-coupling is typically omitted since synaptic phase lag alone can close the Barkhausen loop.'},
    {name:'σ(·)', unit:'mV → s⁻¹ (spikes/s)', meaning:'Somatic sigmoid transfer function', effect:'Converts total membrane perturbation v into an output firing rate; slope sets gain, saturation bounds activity.'},
    {name:'F̂ₑ(t)', unit:'mV', meaning:'Exogenous drive (external input or field)', effect:'Adds directly to the membrane perturbation of the target population.'},
    {name:'Cᵢⱼ', unit:'dimensionless', meaning:'Long-range connectivity', effect:'Typically targets the excitatory pathway between nodes.'},
  ],
  buildup: [
    {id:'onset', step:1, title:'Uncoupled — cross the Barkhausen threshold', param:'gx', startVal:0.1,
     fixed:{gy:1, wxy:1, wyx:1, tau_x:0.5, tau_y:0.5, a:2.5, Fe:0, N:1, G:0},
     prose:'Start with γₓ near 0 — loop gain K = γₓγᵧwₓᵧwᵧₓa² far below threshold, both PSPs decay to their fixed point — and drag it up. Cross K_crit = 2 + τₓ/τᵧ + τᵧ/τₓ and a Hopf bifurcation switches on a sustained limit cycle, with no self-coupling term anywhere in the model — the synapses\' own second-order phase lag alone is enough to close the Barkhausen loop. This is NMM1\'s version of the HO\'s undamped/damped split and WILCO\'s silent/oscillating onset, driven here by synaptic gain instead of a tonic drive.'},
    {id:'coupled', step:2, title:'Coupled network', param:'G', startVal:0,
     fixed:{gx:1, gy:1, wxy:1, wyx:1, tau_x:0.5, tau_y:0.5, a:2.5, Fe:0, N:3},
     prose:'Finally, connect three nodes — each with a slightly different sigmoid slope a — and drag the coupling gain G. At G = 0 every node oscillates independently at its own rate; increasing G pulls the network toward a shared rhythm, the same long-range coupling mechanism as every other model on this site.'},
  ],
  about: `NMM1 is the family that includes the classic <strong>Jansen–Rit</strong> model (three populations: pyramidal, excitatory and inhibitory interneurons), which reproduces alpha-band EEG and realistic evoked responses, and is the standard neuronal model inside Dynamic Causal Modeling (DCM). Related variants — <strong>Wendling's</strong> model (adds fast/slow inhibition, used to study epileptiform activity) and the <strong>laminar model (LaNMM)</strong> (adds depth-resolved, layer-specific generators) — sit in the same family. <strong>Castaldo et al.</strong> place NMM1 above WILCO on the ladder: the same E–I push-pull motif, but now with biologically explicit synaptic kinetics doing the work that WILCO's self-coupling term did more abstractly.`,
},

nmm2: {
  title: 'Next-Generation Neural Mass Model (NMM2)',
  tagline: 'Replaces the heuristic sigmoid with an exact mean-field theory derived from spiking neurons.',
  equations: `
    <div class="info-eq-box">
      <div class="eq-name">Montbrió–Pazó–Roxin mean field (§7, Eq. 7.4–7.6)</div>
      <div class="eq-main">ṙ = Δ/π + 2rv</div>
      <div class="eq-main">v̇ = v² − π²r² + Js + η̄ + I(t)</div>
      <div class="eq-main">s = K̂[r] &nbsp;(synaptic filter)</div>
      <div class="eq-note">Exact reduction of an all-to-all network of quadratic integrate-and-fire (QIF) neurons with heterogeneous excitability, in the large-N limit.</div>
    </div>
    <div class="info-eq-box">
      <div class="eq-name">Coupled E–I pair (§7.1, Eq. 7.8–7.9)</div>
      <div class="eq-main">ṙₓ = Δₓ/π + 2rₓvₓ,&nbsp;&nbsp; v̇ₓ = vₓ² − π²rₓ² + Jₓsₓ − Cₓᵧsᵧ + η̄ₓ + F̂ₑ</div>
      <div class="eq-note">Driven only on the excitatory population, mirroring every other model on this site.</div>
    </div>`,
  how: `<p>Every earlier model on this ladder uses a static "wave-to-pulse" sigmoid to turn membrane potential into firing rate — a convenient but heuristic shortcut. NMM2 replaces it with something derived from first principles: Montbrió, Pazó and Roxin showed that a large population of quadratic integrate-and-fire (QIF) spiking neurons with a spread of excitabilities (drawn from a Lorentzian distribution) reduces <em>exactly</em>, with no approximation, to just two ODEs for the population's mean firing rate r(t) and mean membrane potential v(t).</p>
    <p>The key difference from a static sigmoid is that the r–v relationship is now dynamic: it has its own "inertia" and a gain that depends on the network's recent history, not a fixed curve. Self-coupling strength J shifts the population toward higher firing rates and closer to resonance, which is why NMM2 predicts an enhanced, state-dependent sensitivity to weak, spatially uniform inputs — such as the electric fields used in non-invasive brain stimulation — that static-sigmoid models like WILCO or NMM1 cannot capture on their own.</p>`,
  params: [
    {name:'r(t)', unit:'s⁻¹', meaning:'Population mean firing rate', effect:'The model\'s output variable — replaces the static sigmoid\'s instantaneous readout with genuine dynamics.'},
    {name:'v(t)', unit:'dimensionless (rescaled units)', meaning:'Population mean membrane potential', effect:'Evolves jointly with r(t); together they replace Freeman\'s static wave-to-pulse curve.'},
    {name:'η̄ (eta-bar), Δ (delta)', unit:'s⁻¹', meaning:'Mean and half-width of the Lorentzian excitability distribution', effect:'η̄ biases the population; larger Δ (more heterogeneity) damps coherence and broadens the response.'},
    {name:'J', unit:'s⁻¹', meaning:'Local recurrent self-coupling', effect:'J &gt; 0 (excitatory) shifts fixed points to higher rates and closer to a resonant/oscillatory regime.'},
    {name:'s(t), K̂', unit:'s⁻¹', meaning:'Synaptic activation and its filter', effect:'Filters the firing rate r into a synaptic current, same role as the synapse filters in NMM1.'},
    {name:'I(t), F̂ₑ(t)', unit:'s⁻¹', meaning:'External input (uniform current or electric field)', effect:'Because the r–v gain is state-dependent, the network\'s sensitivity to this input is itself dynamic — not fixed as in a static-sigmoid model.'},
    {name:'Cₙₘ', unit:'dimensionless', meaning:'Long-range connectivity between populations/nodes', effect:'Same role as in every other network form on this site.'},
  ],
  about: `NMM2 is the newest rung: it keeps the E–I push-pull skeleton and the second-order synaptic filters from NMM1, but derives the transfer function itself from first principles (quadratic integrate-and-fire neurons) rather than assuming a sigmoid. <strong>Castaldo et al.</strong> frame this as a principled coarse-graining — in the language of renormalization, r and v are the "relevant" mesoscale variables that survive integrating out fast spiking detail. Applications so far include modeling the emergence of fast collective oscillations, whole-brain simulations on human connectomes, and theories of why densely self-coupled circuits respond more strongly to weak, uniform non-invasive stimulation.`,
},

let activeModel='ho', activeVariant='Oscillator', activeTab='demo', params={}, debounce=null;

function selectTab(tab){
  activeTab=tab;
  document.querySelectorAll('.page-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('variantBar').style.display = tab==='demo' ? '' : 'none';
  document.getElementById('workspace').style.display = tab==='demo' ? '' : 'none';
  document.getElementById('infoPanel').style.display = tab==='info' ? '' : 'none';
  const mm=document.getElementById('mmPanel'); if(mm) mm.style.display = tab==='micromacro' ? '' : 'none';
  if(tab==='info') renderInfoPanel();
  if(tab==='micromacro') renderMicroMacro();
}

  const info=MODEL_INFO[activeModel];
  const panel=document.getElementById('infoPanel');
  if(!info){ panel.innerHTML=''; return; }
  panel.innerHTML=`
    <h2>${info.title}</h2>
    <div class="tagline">${info.tagline}</div>
    <div class="info-section">
      <h3>The Equations</h3>
      ${info.equations}
    </div>
    <div class="info-section">
      <h3>How It Works</h3>
      <div class="info-prose">${info.how}</div>
    </div>
    <div class="info-section">
      <h3>Parameters</h3>
      <table class="param-table">
        <thead><tr><th>Parameter</th><th>Unit</th><th>Meaning</th><th>Effect</th></tr></thead>
        <tbody>${info.params.map(p=>`<tr><td>${p.name}</td><td>${p.unit||'—'}</td><td>${p.meaning}</td><td>${p.effect}</td></tr>`).join('')}</tbody>
      </table>
    </div>
    ${info.buildup ? `
    <div class="info-section">
      <h3>Building the Model, Step by Step</h3>
      <div class="breakdown-list">
        ${info.buildup.map((b)=>{
          const hostId=`bu_${activeModel}_${b.id}_demo`;
          return `

            <div class="breakdown-body">

            </div>

        }).join('')}

    </div>` : ''}
    <div class="info-section">
      <h3>About This Model</h3>
      <div class="info-about">${info.about}</div>
    </div>`;
}

// ============================================================
// BUILDUP DEMOS (Info tab) — reuse each model's own simulate()/plots()
// (time series + phase portrait are always plots [0] and [1]) so there
// is exactly one physics implementation per model. Each step layers a
// fixed "backdrop" of previously introduced parameters (step.fixed)
// instead of the model's global cfg defaults, so the sequence reads as
// cumulative: e.g. free rotation → + damping → + forcing → + coupling,
// one new ingredient at a time.
//
// Every step within a model's buildup section is forced onto the same
// fixed x/y axis ranges (BUILDUP_AXIS_RANGES below) instead of each
// plot auto-scaling to its own data — that way amplitude/scale changes
// between steps are directly comparable rather than hidden by rescaling.
// ============================================================
const BUILDUP_AXIS_RANGES = {
  ho:    {p0:{x:[0,10],  y:[-3,3]},   p1:{x:[-3,3],   y:[-3,3]}},
  sl:    {p0:{x:[0,30],  y:[-4,4]},   p1:{x:[-4,4],   y:[-4,4]}},
  wilco: {p0:{x:[0,500], y:[-0.05,1.05]}, p1:{x:[-0.05,1.05], y:[-0.05,1.05]}},
  nmm1:  {p0:{x:[0,20],  y:[-2.5,2.5]}, p1:{x:[-2.5,2.5], y:[-2.5,2.5]}},
};
// The coupled (N>1) steps reuse each model's normal network view, which for
// WILCO/NMM1 is a stacked one-row-per-node layout (xaxis, xaxis2, xaxis3, ...)
// instead of the single xaxis/yaxis pair every other step uses — and for WILCO
// specifically, the second plot becomes a power spectrum, not a phase portrait,
// so it isn't a comparable quantity and is left auto-scaled rather than forced
// onto the phase-portrait range.
function applyBuildupAxisRange(layout, range){
  const rowKeys=Object.keys(layout).filter(k=>/^(x|y)axis\d*$/.test(k));
  const isStacked=rowKeys.some(k=>/\d/.test(k));
  if(!isStacked){
    layout.xaxis={...layout.xaxis, range:range.x, autorange:false};
    layout.yaxis={...layout.yaxis, range:range.y, autorange:false};
    return;
  }
  rowKeys.forEach(k=>{
    if(k.startsWith('x')) layout[k]={...layout[k], range:range.x, autorange:false};
    else layout[k]={...layout[k], range:range.y, autorange:false};
  });
}
function buildupDefaults(modelId, step){
  const impl=MODELS[modelId].impl;
  const variant=impl.variants[0];
  const cfg=impl.cfg[variant];
  const vals={};
  cfgAllParams(cfg).forEach(sp=>{vals[sp.id]=sp.def;});
  Object.assign(vals, step.fixed);
  vals[step.param]=step.startVal;
  return {variant, cfg, vals};
}
function runBuildupDemo(modelId, variant, vals, hostId){
  const impl=MODELS[modelId].impl;
  const sim=impl.simulate(variant, vals);
  const plots=impl.plots(variant, vals, sim);
  const ranges=BUILDUP_AXIS_RANGES[modelId];
  [0,1].forEach(i=>{
    const el=document.getElementById(`${hostId}_p${i}`);
    if(!el || !plots[i]) return;
    const layout={...plots[i].layout};
    const title=(layout.title && layout.title.text) || '';
    const r=ranges && ranges[`p${i}`];
    if(r && !/spectrum/i.test(title)) applyBuildupAxisRange(layout, r);
    const h=plots[i].height || 180;
    el.style.height=h+'px';
    Plotly.react(el.id, plots[i].data, {...layout, margin:{t:24,b:28,l:36,r:6}, height:h, showlegend:false}, PCFG);
  });
}
let _buildupDebounce={};
function onBuildupSlider(modelId, stepId, paramId, hostId, val){

function cfgAllParams(cfg){
  return cfg.params;
}
// Slider definitions live inside a specific variant's cfg (e.g. G/N only exist on the
// "Network" variant now), but buildup-step demos always run against the model's first
// variant. Search every variant so a step can reference a slider owned by another one.
function findParamDef(modelId, paramId){
  const impl=MODELS[modelId].impl;
  for(const v of impl.variants){
    const sp=cfgAllParams(impl.cfg[v]).find(s=>s.id===paramId);
    if(sp) return sp;
  }
  return null;
}
function sliderGroupHtml(sp, params){
  const val=params[sp.id]??sp.def;

        onclick="setSliderZero('${sp.id}')" ${isZero?'disabled':''}>${sp.zeroLabel}</button>` : '';
  return `
    <div class="slider-group">
      <div class="slider-row">
        <label for="sl_${sp.id}">${sp.label}</label>
        <span class="val" id="val_${sp.id}">${val.toFixed(2)}</span>

      <input type="range" id="sl_${sp.id}" min="${sp.min}" max="${sp.max}" step="${sp.step}"
        value="${val}" oninput="onSlider('${sp.id}',this.value)">${zeroBadge}
    </div>`;
}

// ============================================================
// MICRO → MACRO — NMM2 only. 30 QIF neurons (θ-neuron form, exactly QIF via
// V = tan(θ/2)) vs the MPR mean field. §7, Eq. 7.1 (micro) & 7.4–7.6 (macro).
// ============================================================
const MM = {
  N:100, dt:0.005, T:30, tau_s:1.0, playDur:22, win:0.12,
  params:{eta:-5, delta:1, J:10, I:5},
  sliders:[
    {id:'eta',   label:'η̄  (mean excitability)',   min:-10, max:5,  step:0.5},
    {id:'delta', label:'Δ  (excitability spread)',  min:0.1, max:3,  step:0.1},
    {id:'J',     label:'J  (recurrent coupling)',   min:0,   max:20, step:0.5},
    {id:'I',     label:'I  (external input)',       min:-5,  max:12, step:0.5},
  ],
  sim:null, playT:0, playing:false, raf:null, sel:50, lastReal:0,
};

function mmCompute(){
  const {eta,delta,J,I}=MM.params, N=MM.N, dt=MM.dt, PI=Math.PI, PI2=PI*PI;
  const steps=Math.round(MM.T/dt);
  const etas=new Float64Array(N);
  for(let i=0;i<N;i++) etas[i]=eta+delta*Math.tan(PI/2*(2*(i+1)-N-1)/(N+1));
  const th=new Float64Array(N);
  for(let i=0;i<N;i++) th[i]=-2.5+1.0*i/(N-1);          // deterministic spread of start states
  let s=0.0;
  const ts=new Float32Array(steps), rateRaw=new Float32Array(steps);
  const thTrace=Array.from({length:N},()=>new Float32Array(steps));
  const spikes=[];
  for(let k=0;k<steps;k++){
    const t=k*dt, drive=J*s+I;
    let nf=0;
    for(let i=0;i<N;i++){
      const cur=etas[i]+drive, x=th[i];
      const f=(a)=>(1-Math.cos(a))+(1+Math.cos(a))*cur;
      const k1=f(x), k2=f(x+0.5*dt*k1), k3=f(x+0.5*dt*k2), k4=f(x+dt*k3);
      let xn=x+dt/6*(k1+2*k2+2*k3+k4);
      if(x<PI && xn>=PI){ spikes.push({t,id:i}); nf++; }
      if(xn>=PI) xn-=2*PI;
      th[i]=xn; thTrace[i][k]=xn;
    }
    const R=nf/(N*dt);
    s=s+dt*(-s+R)/MM.tau_s;
    ts[k]=t; rateRaw[k]=R;
  }
  // centred box-smoothing of the raw population rate (window ~0.4 τ)
  const w2=Math.max(1,Math.round(0.2/dt)), rateSm=new Float32Array(steps);
  for(let k=0;k<steps;k++){ let a=0,c=0; for(let j=Math.max(0,k-w2);j<=Math.min(steps-1,k+w2);j++){a+=rateRaw[j];c++;} rateSm[k]=a/c; }
  // MPR mean field with first-order synapse (Eq. 7.4–7.6)
  const rateMF=new Float32Array(steps);
  { let r=0.1,v=-2.0,sm=0.1;
    for(let k=0;k<steps;k++){ const dr=delta/PI+2*r*v, dv=v*v-PI2*r*r+eta+J*sm+I, ds=(-sm+r)/MM.tau_s;
      r+=dt*dr; v+=dt*dv; sm+=dt*ds; rateMF[k]=r>0?r:0; } }
  let maxR=0.2; for(let k=0;k<steps;k++){ if(rateMF[k]>maxR)maxR=rateMF[k]; if(rateSm[k]>maxR)maxR=rateSm[k]; }
  MM.sim={steps,ts,spikes,rateSm,rateMF,thTrace,maxR};
}

function mmXt(c,padL,padR){ return t=>padL+(t/MM.T)*(c.width-padL-padR); }
function mmDrawRaster(){
  const c=document.getElementById('mmRaster'); if(!c||!MM.sim) return;
  const ctx=c.getContext('2d'), W=c.width, H=c.height, padL=30, padR=8, padT=8, padB=16, N=MM.N;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#e6e9f2'; ctx.lineWidth=1; ctx.strokeRect(padL,padT,W-padL-padR,H-padT-padB);
  ctx.fillStyle='#8a8fa3'; ctx.font='9px sans-serif'; ctx.textAlign='right';
  ctx.fillText(String(N),padL-3,padT+8); ctx.fillText('1',padL-3,H-padB);
  ctx.textAlign='center'; ctx.fillText('t = 0…'+MM.T,W/2,H-3);
  const xx=mmXt(c,padL,padR), yy=id=>padT+((N-1-id)/(N-1))*(H-padT-padB), pt=MM.playT;
  const tickH=Math.max(0.8,Math.min(2.1,(H-padT-padB)/(N-1)*0.85));
  ctx.strokeStyle='#0f4bb3'; ctx.lineWidth=1; ctx.beginPath();
  for(const sp of MM.sim.spikes){ if(sp.t>pt) break; const x=xx(sp.t), y=yy(sp.id); ctx.moveTo(x,y-tickH); ctx.lineTo(x,y+tickH); }
  ctx.stroke();
  ctx.strokeStyle='#FF6F00'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(xx(pt),padT); ctx.lineTo(xx(pt),H-padB); ctx.stroke();
}
function mmDrawRate(){
  const c=document.getElementById('mmRate'); if(!c||!MM.sim) return;
  const ctx=c.getContext('2d'), W=c.width, H=c.height, padL=30, padR=8, padT=8, padB=16;
  const {ts,rateSm,rateMF,maxR,steps}=MM.sim, pt=MM.playT;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#e6e9f2'; ctx.lineWidth=1; ctx.strokeRect(padL,padT,W-padL-padR,H-padT-padB);
  const xx=mmXt(c,padL,padR), yy=r=>H-padB-(r/(maxR*1.1))*(H-padT-padB);
  ctx.strokeStyle=BLUE; ctx.lineWidth=2; ctx.beginPath();
  for(let k=0;k<steps;k++){ const x=xx(ts[k]),y=yy(rateMF[k]); k?ctx.lineTo(x,y):ctx.moveTo(x,y); } ctx.stroke();
  ctx.strokeStyle=CORAL; ctx.lineWidth=1.6; ctx.beginPath(); let st=false;
  for(let k=0;k<steps;k++){ if(ts[k]>pt) break; const x=xx(ts[k]),y=yy(rateSm[k]); st?ctx.lineTo(x,y):ctx.moveTo(x,y); st=true; } ctx.stroke();
  ctx.strokeStyle='#FF6F00'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(xx(pt),padT); ctx.lineTo(xx(pt),H-padB); ctx.stroke();
  ctx.fillStyle='#8a8fa3'; ctx.font='9px sans-serif'; ctx.textAlign='right';
  ctx.fillText(maxR.toFixed(1),padL-3,padT+8); ctx.fillText('0',padL-3,H-padB);
  ctx.textAlign='left'; ctx.fillText('firing rate r',padL+3,padT+8);
}
function mmDrawNodes(){
  if(!MM.sim) return; const pt=MM.playT, win=MM.win, lit=new Array(MM.N).fill(false);
  for(const sp of MM.sim.spikes){ if(sp.t>pt) break; if(sp.t>pt-win) lit[sp.id]=true; }
  for(let i=0;i<MM.N;i++){ const el=document.getElementById('mmnode'+i); if(el) el.classList.toggle('fired',lit[i]); }
}
function mmDrawNeuron(){
  const c=document.getElementById('mmNeuronTrace'); if(!c||!MM.sim) return;
  const ctx=c.getContext('2d'), W=c.width, H=c.height, padL=6, padR=6, padT=6, padB=6;
  const {thTrace,ts,steps}=MM.sim, th=thTrace[MM.sel], pt=MM.playT, PI=Math.PI, clip=8;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#eef0f6'; ctx.lineWidth=0.7; ctx.beginPath(); ctx.moveTo(padL,H/2); ctx.lineTo(W-padR,H/2); ctx.stroke();
  const xx=mmXt(c,padL,padR), yy=V=>H/2-(Math.max(-clip,Math.min(clip,V))/clip)*(H/2-padT);
  ctx.strokeStyle='#0f7bb3'; ctx.lineWidth=1.3; ctx.beginPath(); let st=false;
  for(let k=0;k<steps;k++){ if(k>0 && Math.abs(th[k]-th[k-1])>3){ st=false; } const V=Math.tan(th[k]/2); const x=xx(ts[k]),y=yy(V); st?ctx.lineTo(x,y):ctx.moveTo(x,y); st=true; }
  ctx.stroke();
  ctx.strokeStyle='#FF6F00'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(xx(pt),padT); ctx.lineTo(xx(pt),H-padB); ctx.stroke();
  ctx.fillStyle='#8a8fa3'; ctx.font='9px sans-serif'; ctx.textAlign='left'; ctx.fillText('neuron '+(MM.sel+1)+' — V(t)',padL+2,padT+7);
}
function mmDrawFrame(){ mmDrawRaster(); mmDrawRate(); mmDrawNodes(); mmDrawNeuron(); }

function mmUpdateBtn(){ const b=document.getElementById('mmPlayBtn'); if(b) b.textContent=MM.playing?'❚❚ Pause':'▶ Play'; }
function mmFrame(now){
  if(!MM.playing) return;
  const dtr=Math.min(0.05,(now-MM.lastReal)/1000); MM.lastReal=now;
  MM.playT+=dtr*(MM.T/MM.playDur);
  if(MM.playT>=MM.T) MM.playT-=MM.T;   // loop indefinitely
  mmDrawFrame();
  MM.raf=requestAnimationFrame(mmFrame);
}
function mmToggle(){
  if(MM.playing){ MM.playing=false; if(MM.raf) cancelAnimationFrame(MM.raf); }
  else { if(MM.playT>=MM.T) MM.playT=0; MM.playing=true; MM.lastReal=performance.now(); MM.raf=requestAnimationFrame(mmFrame); }
  mmUpdateBtn();
}
function mmReset(){ MM.playing=false; if(MM.raf) cancelAnimationFrame(MM.raf); MM.playT=0; mmUpdateBtn(); mmDrawFrame(); }
function mmComputeAndDraw(){ mmCompute(); MM.playT=0; MM.playing=false; mmUpdateBtn(); mmDrawFrame(); }
let _mmSliderT=null;
function mmOnSlider(id,val){
  MM.params[id]=parseFloat(val);
  const el=document.getElementById('mmval_'+id); if(el) el.textContent=parseFloat(val).toFixed(2);
  if(MM.raf) cancelAnimationFrame(MM.raf); MM.playing=false; mmUpdateBtn();
  clearTimeout(_mmSliderT); _mmSliderT=setTimeout(mmComputeAndDraw,110);   // debounce the heavier recompute
}
function mmSelectNeuron(i){
  MM.sel=i;
  document.querySelectorAll('.mm-node').forEach(n=>n.classList.toggle('sel',+n.dataset.id===i));
  mmDrawNeuron();
}
function renderMicroMacro(){
  const panel=document.getElementById('mmPanel'); if(!panel) return;
  if(activeModel!=='nmm2'){ panel.innerHTML='<div class="mm-intro">The micro→macro view exists only for <b>NMM2</b> — the one model built up from single spiking neurons.</div>'; return; }
  const sl=MM.sliders.map(s=>`<div class="mm-slider"><label>${s.label} <span id="mmval_${s.id}">${MM.params[s.id].toFixed(2)}</span></label><input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${MM.params[s.id]}" oninput="mmOnSlider('${s.id}',this.value)"></div>`).join('');
  let nodes=''; for(let i=0;i<MM.N;i++) nodes+=`<button class="mm-node${i===MM.sel?' sel':''}" id="mmnode${i}" data-id="${i}" onclick="mmSelectNeuron(${i})" title="neuron ${i+1}"></button>`;
  panel.innerHTML=`
    <div class="mm-intro">${MM.N} spiking <b>QIF neurons</b> (Eq. 7.1), coupled all-to-all. The <b style="color:${BLUE}">NMM2 mean field</b> (Eq. 7.4–7.6) predicts their average firing rate <em>before you run</em> — press play and watch the <b style="color:${CORAL}">measured average</b> track it. More neurons ⇒ tighter match.</div>
    <div class="mm-controls">
      <div class="mm-sliders">${sl}</div>
      <div class="mm-buttons"><button class="mm-btn primary" id="mmPlayBtn" onclick="mmToggle()">▶ Play</button><button class="mm-btn" onclick="mmReset()">Reset</button></div>
    </div>
    <div class="mm-stage">
      <div class="mm-col-left">
        <div class="mm-label">${MM.N} QIF neurons</div>
        <div class="mm-node-grid">${nodes}</div>
        <div class="mm-mini"><canvas id="mmNeuronTrace" width="240" height="82"></canvas></div>
        <div class="mm-cap">one neuron = QIF: V̇ = V² + ηⱼ + J·s + I — click a node.</div>
      </div>
      <div class="mm-col-right">
        <canvas id="mmRaster" width="600" height="152"></canvas>
        <div class="mm-cap">Raster: one tick per spike (row = neuron ID).</div>
        <canvas id="mmRate" width="600" height="118"></canvas>
        <div class="mm-cap"><b style="color:${CORAL}">Measured average</b> vs <b style="color:${BLUE}">NMM2 prediction</b>.</div>
      </div>
    </div>`;
  mmComputeAndDraw();
}
function selectVariant(v){
  renderGen++;
  activeVariant=v; params={};
  renderVariantBar();
  const m=MODELS[activeModel], cfg=m.impl.cfg[v];
  cfgAllParams(cfg).forEach(sp=>{params[sp.id]=sp.def;});
  renderLeft();
  const sim=m.impl.simulate(v,params);
  renderRight(m.impl.plots(v,params,sim));
}
function onSlider(id,val){
  const v=parseFloat(val);
  params[id]=v;
  const el=document.getElementById('val_'+id);
  if(el)el.textContent=v.toFixed(2);
  const badge=document.getElementById('zb_'+id);
  if(badge){
    const isZero=Math.abs(v)<1e-9;
    badge.classList.toggle('active',isZero);
    badge.disabled=isZero;
  }
  clearTimeout(debounce);
  debounce=setTimeout(runAndPlot,120);
}
// Lets the zero-badge chip (e.g. "undamped"/"unforced") jump a slider straight to 0
// instead of dragging it there by hand.
function setSliderZero(id){
  const el=document.getElementById('sl_'+id);
  if(!el) return;
  el.value=0;
  onSlider(id,'0');
}
function toggleExplain(h){
  h.nextElementSibling.classList.toggle('visible');
  h.querySelector('.chevron').classList.toggle('open');
}
document.querySelectorAll('.model-tab').forEach(btn=>
  btn.addEventListener('click',()=>selectModel(btn.dataset.model))
);
// Deep link support: index.html's model cards link here as ?model=wilco etc.
(function(){
  const requested=new URLSearchParams(location.search).get('model');
  if(requested && MODELS[requested]){
    activeModel=requested;
    activeVariant=(MODELS[requested].impl?.variants[0])||'';
    document.querySelectorAll('.model-tab').forEach(t=>t.classList.toggle('active',t.dataset.model===requested));
  }
  // the Micro → Macro tab exists only for NMM2 — reveal it on deep-link load too
  const mmTab=document.getElementById('mmTab');
  if(mmTab) mmTab.style.display=(activeModel==='nmm2')?'':'none';
})();
fullRender();
</script>
